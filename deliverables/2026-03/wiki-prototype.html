<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘却前夜 WIKI — 唤醒体图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b10;
  --panel: #111219;
  --card: #161820;
  --card-hover: #1c1e28;
  --border: #252630;
  --gold: #c5a356;
  --gold-light: #e2c97e;
  --gold-dark: #8a7a48;
  --text: #d4c9a8;
  --text-sub: #6b6040;
  --chaos: #c5a356;
  --aequor: #3498db;
  --caro: #e74c3c;
  --ultra: #9b59b6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.site-header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 14px 24px; position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 1400px; margin: 0 auto; display: flex;
  align-items: center; gap: 16px; flex-wrap: wrap;
}
.header-logo { display: flex; flex-direction: column; }
.site-title {
  font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700;
  color: var(--gold-light); letter-spacing: 2px; white-space: nowrap;
}
.site-subtitle { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-top: 2px; }
.search-wrap {
  position: relative; flex: 1; max-width: 280px;
}
.search-wrap input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 12px 7px 34px; color: var(--text);
  font-family: 'Noto Sans SC', sans-serif; font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: var(--text-sub); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-sub); font-size: 14px; pointer-events: none;
}
.main { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
.filter-bar {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 20px;
  flex-wrap: wrap; align-items: flex-start;
}
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-label {
  font-size: 10px; color: var(--text-sub); font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
}
.filter-options { display: flex; gap: 5px; flex-wrap: wrap; }
.fbtn {
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--card); color: var(--text-sub); font-family: 'Noto Sans SC', sans-serif;
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.fbtn:hover { border-color: var(--gold-dark); color: var(--text); }
.fbtn.active { color: #fff; border-color: transparent; }
.fbtn[data-realm="chaos"].active { background: var(--chaos); color: #000; }
.fbtn[data-realm="aequor"].active { background: var(--aequor); }
.fbtn[data-realm="caro"].active { background: var(--caro); }
.fbtn[data-realm="ultra"].active { background: var(--ultra); }
.fbtn[data-role].active, .fbtn[data-rarity].active, .fbtn[data-tier].active { background: var(--gold); color: #000; border-color: transparent; }
.sort-group { display: flex; flex-direction: column; gap: 6px; margin-left: auto; }
select.sort-sel {
  background: var(--card); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 12px;
  padding: 5px 8px; outline: none; cursor: pointer;
}
select.sort-sel:focus { border-color: var(--gold); }
.results-info { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; }
.results-info span { color: var(--gold); font-weight: 700; }
.char-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px;
}
.char-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; cursor: pointer; transition: all 0.2s; position: relative;
}
.char-card:hover { border-color: var(--gold-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.char-card[data-realm="chaos"] { --rc: var(--chaos); }
.char-card[data-realm="aequor"] { --rc: var(--aequor); }
.char-card[data-realm="caro"] { --rc: var(--caro); }
.char-card[data-realm="ultra"] { --rc: var(--ultra); }
.card-bar { height: 3px; background: var(--rc); }
.card-art {
  width: 100%; aspect-ratio: 3/4; background: linear-gradient(160deg, var(--panel) 0%, var(--card) 100%);
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
}
.card-art img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.art-placeholder {
  font-size: 32px; font-family: 'Noto Serif SC', serif; font-weight: 700;
  color: var(--rc); opacity: 0.12;
}
.badge-rarity {
  position: absolute; top: 6px; right: 6px; font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.75);
  border: 1px solid var(--rc); color: var(--rc);
}
.badge-tier {
  position: absolute; top: 6px; left: 6px; font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.8);
  color: var(--gold-light); border: 1px solid var(--gold-dark);
}
.badge-limited {
  position: absolute; bottom: 6px; right: 6px; font-size: 8px; font-weight: 700;
  padding: 1px 5px; border-radius: 2px; background: rgba(197,163,86,0.9); color: #000;
}
.card-info { padding: 8px 10px 10px; }
.card-name {
  font-family: 'Noto Serif SC', serif; font-size: 13px; font-weight: 700;
  color: var(--gold-light); margin-bottom: 1px; line-height: 1.3;
}
.card-en { font-size: 10px; color: var(--text-sub); letter-spacing: 0.5px; margin-bottom: 5px; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.role-chip {
  font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: rgba(255,255,255,0.05); color: var(--text-sub); border: 1px solid var(--border);
}
.empty-msg { text-align: center; padding: 60px 20px; color: var(--text-sub); font-size: 13px; grid-column: 1/-1; }
/* Modal */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  z-index: 1000; align-items: center; justify-content: center; padding: 16px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 620px; max-height: 90vh; overflow: hidden;
  display: flex; flex-direction: column; animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.modal-head { padding: 18px 18px 0; display: flex; gap: 14px; align-items: flex-start; }
.modal-accent { width: 4px; border-radius: 2px; min-height: 56px; flex-shrink: 0; }
.modal-titles { flex: 1; }
.modal-name {
  font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700;
  color: var(--gold-light); margin-bottom: 2px;
}
.modal-en { font-size: 12px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 8px; }
.modal-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.mbadge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
}
.mbadge-realm { color: #fff; }
.mbadge-role { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border); }
.mbadge-tier { background: rgba(226,201,126,0.1); color: var(--gold-light); border: 1px solid var(--gold-dark); }
.mbadge-limited { background: rgba(197,163,86,0.18); color: var(--gold); border: 1px solid var(--gold-dark); }
.mbadge-free { background: rgba(74,174,90,0.18); color: #7aad5a; border: 1px solid #4a7a3a; }
.modal-close {
  background: none; border: none; cursor: pointer; color: var(--text-sub);
  font-size: 18px; padding: 4px 6px; border-radius: 4px; line-height: 1; flex-shrink: 0;
}
.modal-close:hover { color: var(--text); background: var(--card); }
.modal-tabs {
  display: flex; padding: 14px 18px 0; border-bottom: 1px solid var(--border);
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-sub); font-family: 'Noto Sans SC', sans-serif;
  font-size: 12px; font-weight: 500; padding: 7px 14px; cursor: pointer;
  transition: all 0.15s; margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); }
.modal-body { overflow-y: auto; flex: 1; padding: 16px 18px 20px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.attr-desc { font-size: 13px; line-height: 1.85; color: var(--text); margin-bottom: 14px; font-weight: 500; }
.attr-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
.attr-tbl td { padding: 6px 10px; border: 1px solid var(--border); font-weight: 500; }
.attr-tbl td:first-child {
  color: var(--text-sub); background: var(--card); font-weight: 700; width: 25%; white-space: nowrap;
}
.attr-tbl tr:nth-child(even) td:not(:first-child) { background: rgba(197,163,86,0.03); }
.tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
.tag-chip {
  font-size: 10px; padding: 2px 7px; border-radius: 3px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-sub);
}
.sec-title {
  font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 1px;
  text-transform: uppercase; margin: 14px 0 7px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.cmd-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 4px; }
.cmd-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px;
}
.cmd-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.cmd-cost {
  width: 22px; height: 22px; border-radius: 50%; background: var(--gold); color: #000;
  font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.cmd-cost.c0 { background: rgba(255,255,255,0.1); color: var(--text); }
.cmd-cost.cv { background: rgba(197,163,86,0.3); color: var(--gold-light); }
.cmd-name { font-size: 12px; font-weight: 700; color: var(--gold-light); }
.cmd-en { font-size: 10px; color: var(--text-sub); }
.cmd-effect { font-size: 12px; color: var(--text); line-height: 1.65; font-weight: 500; }
.cmd-note { font-size: 11px; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }
.exalt-card {
  background: rgba(197,163,86,0.05); border: 1px solid rgba(197,163,86,0.18);
  border-radius: 6px; padding: 10px 12px;
}
.exalt-name { font-size: 12px; font-weight: 700; color: var(--gold-light); margin-bottom: 4px; }
.exalt-effect { font-size: 12px; color: var(--text); line-height: 1.7; font-weight: 500; }
.overexalt-card {
  background: rgba(155,89,182,0.07); border: 1px solid rgba(155,89,182,0.25);
  border-radius: 6px; padding: 10px 12px; margin-top: 7px;
}
.overexalt-name { font-size: 12px; font-weight: 700; color: #c39de0; margin-bottom: 4px; }
.no-data { font-size: 13px; color: var(--text-sub); text-align: center; padding: 28px; }
.enl-list { display: flex; flex-direction: column; gap: 9px; }
.enl-item {
  display: flex; gap: 11px; align-items: flex-start;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px;
}
.enl-lvl {
  width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--gold-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0;
}
.enl-body { flex: 1; }
.enl-name { font-size: 12px; font-weight: 700; color: var(--gold-light); margin-bottom: 3px; }
.enl-effect { font-size: 12px; color: var(--text); line-height: 1.6; font-weight: 500; }
.site-footer {
  text-align: center; padding: 28px; color: var(--text-sub); font-size: 11px;
  border-top: 1px solid var(--border); margin-top: 36px; letter-spacing: 0.5px;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
@media (max-width: 600px) {
  .char-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .filter-bar { gap: 12px; }
  .tab-btn { padding: 7px 10px; font-size: 11px; }
  .modal-name { font-size: 17px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="site-title">忘却前夜 WIKI</div>
      <div class="site-subtitle">MORIMENS — 唤醒体图鉴</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="搜索角色名 / English name...">
    </div>
  </div>
</header>

<main class="main">
  <div class="filter-bar">
    <div class="filter-group">
      <div class="filter-label">界域</div>
      <div class="filter-options" id="realmFilters">
        <button class="fbtn active" data-realm="all">全部</button>
        <button class="fbtn" data-realm="chaos">混沌</button>
        <button class="fbtn" data-realm="aequor">深海</button>
        <button class="fbtn" data-realm="caro">血肉</button>
        <button class="fbtn" data-realm="ultra">超维</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">定位</div>
      <div class="filter-options" id="roleFilters">
        <button class="fbtn active" data-role="all">全部</button>
        <button class="fbtn" data-role="attack">输出</button>
        <button class="fbtn" data-role="sub_attack">副输出</button>
        <button class="fbtn" data-role="support">辅助</button>
        <button class="fbtn" data-role="defense">防御</button>
        <button class="fbtn" data-role="healer">治疗</button>
        <button class="fbtn" data-role="chorus">合唱</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">获取</div>
      <div class="filter-options" id="rarityFilters">
        <button class="fbtn active" data-rarity="all">全部</button>
        <button class="fbtn" data-rarity="limited">限定</button>
        <button class="fbtn" data-rarity="permanent">常驻</button>
      </div>
    </div>
    <div class="sort-group">
      <div class="filter-label">排序</div>
      <select class="sort-sel" id="sortSel">
        <option value="tier">强度 Tier</option>
        <option value="realm">界域</option>
        <option value="name">中文名</option>
        <option value="en">英文名</option>
        <option value="role">定位</option>
      </select>
    </div>
  </div>

  <div class="results-info">共显示 <span id="countDisplay">0</span> 个唤醒体</div>

  <div class="char-grid" id="charGrid"></div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-accent" id="modalAccent"></div>
      <div class="modal-titles">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-en" id="modalEn"></div>
        <div class="modal-badges" id="modalBadges"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="switchTab('attr')">属性面板</button>
      <button class="tab-btn" onclick="switchTab('cmd')">指令卡</button>
      <button class="tab-btn" onclick="switchTab('enl')">启灵</button>
    </div>
    <div class="modal-body">
      <div class="tab-panel active" id="tab-attr"></div>
      <div class="tab-panel" id="tab-cmd"></div>
      <div class="tab-panel" id="tab-enl"></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  忘却前夜 WIKI · 数据来源：公开社区情报 · 仅供参考 · Morimens &copy; 2024 脑缸组
</footer>

// ── State ────────────────────────────────────────────────────────
let filters = { realm: 'all', role: 'all', rarity: 'all' };
let sortBy = 'tier';
let search = '';
let activeChar = null;
let activeTab = 'attr';

// ── Helpers ──────────────────────────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function realmColor(r){ return REALM_COLORS[r]||'#888'; }
function tierVal(t){ return TIER_ORDER[t]??4; }

// ── Render grid ──────────────────────────────────────────────────
function filteredChars(){
  return characters.filter(c=>{
    if(filters.realm!=='all' && c.realm!==filters.realm) return false;
    if(filters.role!=='all' && c.role!==filters.role) return false;
    if(filters.rarity!=='all'){
      if(filters.rarity==='limited' && !c.limited) return false;
      if(filters.rarity==='permanent' && c.limited) return false;
    }
    if(search){
      const q=search.toLowerCase();
      return c.name.toLowerCase().includes(q)||c.en.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q));
    }
    return true;
  }).sort((a,b)=>{
    if(sortBy==='tier') return tierVal(a.tier)-tierVal(b.tier)||(a.realm>b.realm?1:-1);
    if(sortBy==='realm'){const ro=['chaos','aequor','caro','ultra'];return ro.indexOf(a.realm)-ro.indexOf(b.realm)||a.name.localeCompare(b.name);}
    if(sortBy==='name') return a.name.localeCompare(b.name,'zh-CN');
    if(sortBy==='en') return a.en.localeCompare(b.en);
    if(sortBy==='role'){const rr=['attack','sub_attack','support','defense','healer','chorus'];return rr.indexOf(a.role)-rr.indexOf(b.role);}
    return 0;
  });
}

function renderGrid(){
  const chars=filteredChars();
  document.getElementById('countDisplay').textContent=chars.length;
  const grid=document.getElementById('charGrid');
  if(!chars.length){grid.innerHTML='<div class="empty-msg">没有匹配的唤醒体</div>';return;}
  grid.innerHTML=chars.map(c=>{
    const rc=realmColor(c.realm);
    const portraitHtml=c.portrait
      ?`<img src="${esc(c.portrait)}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      :'';
    const phStyle=c.portrait?'style="display:none"':'';
    return `<div class="char-card" data-realm="${c.realm}" onclick="openModal('${c.id}')">
  <div class="card-bar"></div>
  <div class="card-art">
    ${portraitHtml}
    <div class="art-placeholder" ${phStyle}>${c.name[0]}</div>
    ${c.tier&&c.tier!=='-'?`<div class="badge-tier">${esc(c.tier)}</div>`:''}
    <div class="badge-rarity">SSR</div>
    ${c.limited?'<div class="badge-limited">LIMITED</div>':''}
  </div>
  <div class="card-info">
    <div class="card-name">${esc(c.name)}</div>
    <div class="card-en">${esc(c.en)}</div>
    <div class="card-tags">
      <span class="role-chip">${esc(REALM_NAMES[c.realm]||c.realm)}</span>
      <span class="role-chip">${esc(ROLE_NAMES[c.role]||c.role)}</span>
    </div>
  </div>
</div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(id){
  const c=characters.find(x=>x.id===id); if(!c) return;
  activeChar=c; activeTab='attr';
  const rc=realmColor(c.realm);
  document.getElementById('modalAccent').style.background=rc;
  document.getElementById('modalName').textContent=c.name;
  document.getElementById('modalEn').textContent=c.en;
  const realmLabel=`<span class="mbadge mbadge-realm" style="background:${rc}">${REALM_NAMES[c.realm]||c.realm}</span>`;
  const roleLabel=`<span class="mbadge mbadge-role">${ROLE_NAMES[c.role]||c.role}</span>`;
  const tierLabel=c.tier&&c.tier!=='-'?`<span class="mbadge mbadge-tier">${c.tier}</span>`:'';
  const limLabel=c.limited?'<span class="mbadge mbadge-limited">限定</span>':'';
  const freeLabel=c.obtain&&c.obtain.includes('免费')?'<span class="mbadge mbadge-free">免费</span>':'';
  document.getElementById('modalBadges').innerHTML=realmLabel+roleLabel+tierLabel+limLabel+freeLabel;
  renderTabs(c);
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
}

function switchTab(tab){
  activeTab=tab;
  const order=['attr','cmd','enl'];
  const idx=order.indexOf(tab);
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function renderTabs(c){
  // Attributes
  const freeNote=c.obtain&&c.obtain.includes('免费')?'<tr><td>获取</td><td style="color:#7aad5a">'+esc(c.obtain)+'</td></tr>':'<tr><td>获取</td><td>'+esc(c.obtain||'—')+'</td></tr>';
  const tagsHtml=c.tags&&c.tags.length?'<tr><td>标签</td><td><div class="tag-row">'+c.tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+'</div></td></tr>':'';
  document.getElementById('tab-attr').innerHTML=`
<div class="attr-desc">${esc(c.desc||'暂无描述')}</div>
<table class="attr-tbl">
<tr><td>界域</td><td style="color:${realmColor(c.realm)};font-weight:700">${REALM_NAMES[c.realm]||c.realm}</td></tr>
<tr><td>定位</td><td>${ROLE_NAMES[c.role]||c.role}</td></tr>
<tr><td>稀有度</td><td style="color:var(--gold-light)">SSR</td></tr>
<tr><td>强度</td><td style="color:var(--gold-light);font-weight:700">${c.tier||'—'}</td></tr>
${freeNote}
${tagsHtml}
</table>`;

  // Commands
  const sk=c.skills;
  if(!sk){ document.getElementById('tab-cmd').innerHTML='<div class="no-data">该角色暂无详细技能数据</div>'; }
  else {
    let html='';
    if(sk.cmds&&sk.cmds.length){
      html+='<div class="sec-title">指令卡</div><div class="cmd-list">';
      html+=sk.cmds.map(cmd=>{
        const costClass=cmd.cost===0||cmd.cost==='0'?'c0':(cmd.cost==='?'||isNaN(cmd.cost)?'cv':'');
        return `<div class="cmd-card">
<div class="cmd-hd"><div class="cmd-cost ${costClass}">${cmd.cost}</div>
<div><div class="cmd-name">${esc(cmd.name)}</div>${cmd.en?`<div class="cmd-en">${esc(cmd.en)}</div>`:''}</div></div>
<div class="cmd-effect">${esc(cmd.effect||'')}</div>
${cmd.note?`<div class="cmd-note">&#9642; ${esc(cmd.note)}</div>`:''}
</div>`;
      }).join('');
      html+='</div>';
    } else if(!sk.rouse&&!sk.exalt){ html='<div class="no-data">指令卡数据待补充</div>'; }
    if(sk.rouse){
      html+=`<div class="sec-title">灵知觉醒</div>
<div class="cmd-card">
<div class="cmd-hd"><div class="cmd-cost cv">觉</div><div><div class="cmd-name">${esc(sk.rouse.name||'灵知觉醒')}</div>${sk.rouse.en?`<div class="cmd-en">${esc(sk.rouse.en)}</div>`:''}</div></div>
<div class="cmd-effect">${esc(sk.rouse.effect||'')}</div>
</div>`;
    }
    if(sk.exalt){
      html+=`<div class="sec-title">狂气爆发</div>
<div class="exalt-card">
<div class="exalt-name">${esc(sk.exalt.name||'狂气爆发')}${sk.exalt.en?` <span style="font-size:10px;color:var(--text-sub);font-weight:400">${esc(sk.exalt.en)}</span>`:''}</div>
<div class="exalt-effect">${esc(sk.exalt.effect||'')}</div>
</div>`;
    }
    if(sk.overexalt){
      html+=`<div class="overexalt-card"><div class="overexalt-name">超限爆发</div><div class="exalt-effect">${esc(sk.overexalt.effect||'')}</div></div>`;
    }
    document.getElementById('tab-cmd').innerHTML=html||'<div class="no-data">指令卡数据待补充</div>';
  }

  // Enlighten
  const enl=sk&&sk.enlighten;
  if(!enl||!enl.length){
    document.getElementById('tab-enl').innerHTML='<div class="no-data">启灵数据待补充</div>';
  } else {
    document.getElementById('tab-enl').innerHTML='<div class="enl-list">'+enl.map(e=>`<div class="enl-item">
<div class="enl-lvl">${e.lv}</div>
<div class="enl-body"><div class="enl-name">${esc(e.name||'')}${e.en?` <span style="font-size:10px;color:var(--text-sub)">${esc(e.en)}</span>`:''}</div>
<div class="enl-effect">${esc(e.effect||'')}</div></div>
</div>`).join('')+'</div>';
  }
}

// ── Filter handlers ───────────────────────────────────────────────
document.getElementById('realmFilters').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn'); if(!btn) return;
  document.querySelectorAll('#realmFilters .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filters.realm=btn.dataset.realm;
  renderGrid();
});
document.getElementById('roleFilters').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn'); if(!btn) return;
  document.querySelectorAll('#roleFilters .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filters.role=btn.dataset.role;
  renderGrid();
});
document.getElementById('rarityFilters').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn'); if(!btn) return;
  document.querySelectorAll('#rarityFilters .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filters.rarity=btn.dataset.rarity;
  renderGrid();
});
document.getElementById('sortSel').addEventListener('change',e=>{
  sortBy=e.target.value; renderGrid();
});
document.getElementById('searchInput').addEventListener('input',e=>{
  search=e.target.value.trim(); renderGrid();
});
document.getElementById('modalBg').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalBg')) closeModal();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
