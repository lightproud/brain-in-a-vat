name: Workflow Health Check

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  actions: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check workflow health
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Workflows to monitor
            const monitored = [
              'update-news.yml',
              'discord-archive.yml',
              'deploy-site.yml',
              'generate-report.yml',
              'validate-data.yml',
            ];

            const failures = [];
            const stale = [];
            const now = new Date();

            for (const wf of monitored) {
              try {
                // Get workflow by filename
                const { data: workflow } = await github.rest.actions.getWorkflow({
                  owner, repo, workflow_id: wf,
                });

                // Get latest run
                const { data: runs } = await github.rest.actions.listWorkflowRuns({
                  owner, repo, workflow_id: workflow.id,
                  per_page: 1,
                  status: 'completed',
                });

                if (runs.workflow_runs.length === 0) {
                  stale.push(`- **${wf}**: no completed runs found`);
                  continue;
                }

                const latest = runs.workflow_runs[0];
                const runDate = new Date(latest.updated_at);
                const hoursAgo = Math.round((now - runDate) / 3600000);

                if (latest.conclusion === 'failure') {
                  failures.push(`- **${wf}**: last run failed ${hoursAgo}h ago — [logs](${latest.html_url})`);
                } else if (hoursAgo > 48) {
                  stale.push(`- **${wf}**: last success was ${hoursAgo}h ago (may be stale)`);
                }
              } catch (e) {
                failures.push(`- **${wf}**: could not check — ${e.message}`);
              }
            }

            if (failures.length === 0 && stale.length === 0) {
              console.log('All monitored workflows are healthy.');
              return;
            }

            // Check if there's already an open health-check issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'health-check',
              state: 'open',
              per_page: 1,
            });

            let body = '## Workflow Health Report\n\n';
            if (failures.length > 0) {
              body += '### Failures\n' + failures.join('\n') + '\n\n';
            }
            if (stale.length > 0) {
              body += '### Stale\n' + stale.join('\n') + '\n\n';
            }
            body += `_Auto-generated at ${now.toISOString()}_`;

            if (existing.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner, repo,
                title: '[主控台] Workflow 健康检查异常',
                body,
                labels: ['health-check'],
              });
            }
