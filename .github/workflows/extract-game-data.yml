name: Extract Game Data from Client

on:
  release:
    types: [published]
  push:
    paths:
      - '.github/triggers/extract-game-data'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to download from (leave empty for latest)'
        required: false
      extract_textures:
        description: 'Extract portrait textures'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Download game data from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Fetching latest release..."
            TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || true)
            if [ -z "$TAG" ]; then
              echo "ERROR: No releases found. Please upload game data as a GitHub Release."
              echo ""
              echo "Steps:"
              echo "  1. Zip your Morimens_Data folder"
              echo "  2. Go to https://github.com/${{ github.repository }}/releases/new"
              echo "  3. Create a tag (e.g. client-v1.0), attach the zip, publish"
              exit 1
            fi
          fi

          echo "Downloading assets from release: $TAG"
          mkdir -p ~/game_data_archive

          # Download all assets from the release
          gh release download "$TAG" --dir ~/game_data_archive
          echo ""
          echo "Downloaded files:"
          ls -lh ~/game_data_archive/

      - name: Extract archive
        run: |
          mkdir -p ~/game_data
          cd ~/game_data_archive

          for f in *; do
            echo "Extracting: $f"
            case "$f" in
              *.zip)       unzip -q -o "$f" -d ~/game_data ;;
              *.tar.gz)    tar xzf "$f" -C ~/game_data ;;
              *.tar.zst)   tar --zstd -xf "$f" -C ~/game_data ;;
              *.7z)        7z x "$f" -o"$HOME/game_data" -y ;;
              *.rar)       7z x "$f" -o"$HOME/game_data" -y ;;
              *)           echo "  Unknown format, skipping: $f" ;;
            esac
          done

          echo ""
          echo "Extracted structure:"
          find ~/game_data -maxdepth 3 -type d | head -30
          echo ""
          echo "Total files: $(find ~/game_data -type f | wc -l)"
          echo "Total size: $(du -sh ~/game_data | cut -f1)"

      - name: Locate game data directory
        id: locate
        run: |
          # Look for *_Data directory
          DATA_DIR=$(find ~/game_data -maxdepth 4 -type d -name "*_Data" | head -1)
          if [ -z "$DATA_DIR" ]; then
            # Try StreamingAssets
            SA=$(find ~/game_data -maxdepth 5 -type d -name "StreamingAssets" | head -1)
            if [ -n "$SA" ]; then
              DATA_DIR="${SA%/StreamingAssets}"
            fi
          fi
          if [ -z "$DATA_DIR" ]; then
            # Maybe the zip IS the _Data contents directly
            if find ~/game_data -maxdepth 2 -name "*.assets" | grep -q .; then
              DATA_DIR="$HOME/game_data"
            fi
          fi
          if [ -z "$DATA_DIR" ]; then
            echo "ERROR: Cannot locate game data directory"
            echo "Full structure:"
            find ~/game_data -maxdepth 4 -type d
            exit 1
          fi
          echo "Found game data: $DATA_DIR"
          echo "data_dir=$DATA_DIR" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install UnityPy Pillow

      - name: Extract game data with UnityPy
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.extract_textures }}" = "false" ]; then
            EXTRA_ARGS="--no-textures"
          fi

          python3 projects/wiki/scripts/extract_client_data.py \
            "${{ steps.locate.outputs.data_dir }}" \
            --output projects/wiki/output/client_extract \
            --map-schema \
            --tex-filter "" \
            $EXTRA_ARGS

      - name: Show extraction results
        if: always()
        run: |
          echo "=== Extraction stats ==="
          cat projects/wiki/output/client_extract/extraction_stats.json 2>/dev/null || echo "No stats"
          echo ""
          echo "=== JSON files ==="
          find projects/wiki/output/client_extract/text -name "*.json" -exec ls -lh {} \; 2>/dev/null | head -30
          echo ""
          echo "=== Textures ==="
          find projects/wiki/output/client_extract/textures -type f 2>/dev/null | wc -l
          echo "texture files"
          echo ""
          TOTAL=$(find projects/wiki/output/client_extract -type f 2>/dev/null | wc -l)
          echo "Total: $TOTAL files"

      - name: Upload extraction results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: game-data-extract-${{ github.run_id }}
          path: projects/wiki/output/client_extract/
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit extracted data to repo
        run: |
          TEXT_DIR="projects/wiki/output/client_extract/text"
          TEX_DIR="projects/wiki/output/client_extract/textures"
          HAS_TEXT=false
          HAS_TEX=false

          if [ -d "$TEXT_DIR" ] && [ -n "$(ls -A $TEXT_DIR 2>/dev/null)" ]; then
            HAS_TEXT=true
          fi
          if [ -d "$TEX_DIR" ] && [ -n "$(ls -A $TEX_DIR 2>/dev/null)" ]; then
            HAS_TEX=true
          fi

          if [ "$HAS_TEXT" = "false" ] && [ "$HAS_TEX" = "false" ]; then
            echo "No data extracted, skipping commit"
            exit 0
          fi

          JSON_COUNT=$(find "$TEXT_DIR" -name "*.json" 2>/dev/null | wc -l)
          TEX_COUNT=$(find "$TEX_DIR" -type f 2>/dev/null | wc -l)
          TOTAL_COUNT=$(find projects/wiki/output/client_extract -type f | wc -l)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/wiki/output/client_extract/

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "feat(wiki): extract game data from client upload

          Extracted $JSON_COUNT JSON configs + $TEX_COUNT textures ($TOTAL_COUNT files total).
          Source: GitHub Release upload
          [skip ci]"

          git pull origin main --rebase
          git push origin main
