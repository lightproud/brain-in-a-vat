name: Extract Game Data from Client

on:
  push:
    paths:
      - '.github/triggers/extract-game-data'
  workflow_dispatch:
    inputs:
      steam_app_id:
        description: 'Steam App ID (default: 3052450 CN version)'
        required: false
        default: '3052450'
      extract_textures:
        description: 'Extract portrait textures'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Download via DepotDownloader
        env:
          STEAM_USER: ${{ secrets.STEAM_USER }}
          STEAM_PASS: ${{ secrets.STEAM_PASS }}
        run: |
          APP_ID="${{ github.event.inputs.steam_app_id || '3052450' }}"

          # Download DepotDownloader (self-contained binary, no .NET needed)
          LATEST=$(curl -s https://api.github.com/repos/SteamRE/DepotDownloader/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "DepotDownloader version: $LATEST"
          curl -sL "https://github.com/SteamRE/DepotDownloader/releases/download/${LATEST}/DepotDownloader-linux-x64.zip" -o /tmp/dd.zip
          mkdir -p ~/depotdownloader
          unzip -q /tmp/dd.zip -d ~/depotdownloader
          chmod +x ~/depotdownloader/DepotDownloader

          # Download game
          echo "Downloading Steam App $APP_ID ..."
          if [ -n "$STEAM_USER" ] && [ -n "$STEAM_PASS" ]; then
            echo "Using Steam account credentials (user: ${STEAM_USER:0:3}***)"
            ~/depotdownloader/DepotDownloader \
              -app "$APP_ID" \
              -os windows \
              -dir ~/steam_depot \
              -max-downloads 8 \
              -username "$STEAM_USER" \
              -password "$STEAM_PASS"
          else
            echo "WARNING: No Steam credentials found (STEAM_USER/STEAM_PASS secrets not set)"
            echo "Trying anonymous download (may fail for game clients)"
            ~/depotdownloader/DepotDownloader \
              -app "$APP_ID" \
              -os windows \
              -dir ~/steam_depot \
              -max-downloads 8
          fi

          echo ""
          echo "Download complete."
          du -sh ~/steam_depot
          echo "Top-level structure:"
          find ~/steam_depot -maxdepth 2 -type d | head -30
          echo "File count:"
          find ~/steam_depot -type f | wc -l

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install UnityPy Pillow

      - name: Locate game data directory
        id: locate
        run: |
          echo "=== Looking for *_Data directory ==="
          DATA_DIR=$(find ~/steam_depot -maxdepth 3 -type d -name "*_Data" | head -1)
          if [ -z "$DATA_DIR" ]; then
            echo "Trying StreamingAssets..."
            SA=$(find ~/steam_depot -maxdepth 4 -type d -name "StreamingAssets" | head -1)
            if [ -n "$SA" ]; then
              DATA_DIR="${SA%/StreamingAssets}"
            fi
          fi
          if [ -z "$DATA_DIR" ]; then
            echo "ERROR: Cannot locate game data directory"
            echo "Directory structure:"
            find ~/steam_depot -maxdepth 3 -type d
            exit 1
          fi
          echo "Found: $DATA_DIR"
          echo "data_dir=$DATA_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract game data
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.extract_textures }}" = "false" ]; then
            EXTRA_ARGS="--no-textures"
          fi

          python3 projects/wiki/scripts/extract_client_data.py \
            "${{ steps.locate.outputs.data_dir }}" \
            --output projects/wiki/output/client_extract \
            --map-schema \
            $EXTRA_ARGS

      - name: Show extraction results
        if: always()
        run: |
          echo "=== Extraction stats ==="
          cat projects/wiki/output/client_extract/extraction_stats.json 2>/dev/null || echo "No stats file"
          echo ""
          echo "=== Extracted files ==="
          find projects/wiki/output/client_extract -type f 2>/dev/null | head -50
          echo ""
          TOTAL=$(find projects/wiki/output/client_extract -type f 2>/dev/null | wc -l)
          echo "Total: $TOTAL files"

      - name: Upload extraction results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-data-extract-${{ github.run_id }}
          path: projects/wiki/output/client_extract/
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit extracted data to repo
        run: |
          TEXT_DIR="projects/wiki/output/client_extract/text"
          if [ ! -d "$TEXT_DIR" ] || [ -z "$(ls -A $TEXT_DIR 2>/dev/null)" ]; then
            echo "No text assets extracted, skipping commit"
            exit 0
          fi

          JSON_COUNT=$(find "$TEXT_DIR" -name "*.json" | wc -l)
          TOTAL_COUNT=$(find "$TEXT_DIR" -type f | wc -l)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/wiki/output/client_extract/text/
          git add projects/wiki/output/client_extract/extraction_stats.json 2>/dev/null || true
          git add projects/wiki/output/client_extract/schema_mapping_report.json 2>/dev/null || true

          if [ -d "projects/wiki/output/client_extract/textures" ]; then
            git add projects/wiki/output/client_extract/textures/
          fi

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "feat(wiki): auto-extract game data from Steam client

          Extracted $JSON_COUNT JSON + $((TOTAL_COUNT - JSON_COUNT)) other config files.
          Source: Steam App ${{ github.event.inputs.steam_app_id || '3052450' }} via DepotDownloader
          [skip ci]"

          git pull origin main --rebase
          git push origin main
