name: Extract Game Data from Client

on:
  workflow_dispatch:
    inputs:
      steam_app_id:
        description: 'Steam App ID (default: 3052450 CN version)'
        required: false
        default: '3052450'
      extract_textures:
        description: 'Extract portrait textures'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Generate cache key
        id: cache-key
        run: |
          # Use date as part of cache key so we re-download periodically
          echo "key=morimens-client-${{ github.event.inputs.steam_app_id || '3052450' }}-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Cache game client
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/steam_depot
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install DepotDownloader
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # Install .NET runtime
          sudo apt-get update -qq
          sudo apt-get install -y -qq dotnet-runtime-8.0 || {
            # Fallback: install from Microsoft
            wget -q https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
            chmod +x dotnet-install.sh
            ./dotnet-install.sh --channel 8.0 --runtime dotnet
            export PATH="$HOME/.dotnet:$PATH"
          }

          # Download DepotDownloader
          LATEST=$(curl -s https://api.github.com/repos/SteamRE/DepotDownloader/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          VERSION="${LATEST#DepotDownloader_}"
          echo "DepotDownloader version: $LATEST"
          curl -sL "https://github.com/SteamRE/DepotDownloader/releases/download/${LATEST}/DepotDownloader-linux-x64.zip" -o dd.zip
          mkdir -p ~/depotdownloader
          unzip -q dd.zip -d ~/depotdownloader
          chmod +x ~/depotdownloader/DepotDownloader

      - name: Download Morimens via Steam (anonymous)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          APP_ID="${{ github.event.inputs.steam_app_id || '3052450' }}"
          echo "Downloading Steam App $APP_ID (anonymous, F2P)..."
          ~/depotdownloader/DepotDownloader \
            -app "$APP_ID" \
            -os windows \
            -dir ~/steam_depot \
            -max-downloads 8
          echo "Download complete."
          du -sh ~/steam_depot

      - name: Upload depot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-depot
          path: ~/steam_depot
          retention-days: 3

  extract:
    runs-on: ubuntu-latest
    needs: download
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install UnityPy Pillow

      - name: Download depot artifact
        uses: actions/download-artifact@v4
        with:
          name: steam-depot
          path: ~/steam_depot

      - name: Locate game data directory
        id: locate
        run: |
          echo "=== Looking for *_Data directory ==="
          DATA_DIR=$(find ~/steam_depot -maxdepth 3 -type d -name "*_Data" | head -1)
          if [ -z "$DATA_DIR" ]; then
            echo "No *_Data dir found, trying StreamingAssets..."
            DATA_DIR=$(find ~/steam_depot -maxdepth 4 -type d -name "StreamingAssets" | head -1)
            DATA_DIR="${DATA_DIR%/StreamingAssets}"
          fi
          if [ -z "$DATA_DIR" ]; then
            echo "ERROR: Cannot locate game data directory"
            echo "Top-level structure:"
            find ~/steam_depot -maxdepth 3 -type d
            exit 1
          fi
          echo "Found: $DATA_DIR"
          echo "data_dir=$DATA_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract game data
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.extract_textures }}" = "false" ]; then
            EXTRA_ARGS="--no-textures"
          fi

          python3 projects/wiki/scripts/extract_client_data.py \
            "${{ steps.locate.outputs.data_dir }}" \
            --output projects/wiki/output/client_extract \
            --map-schema \
            $EXTRA_ARGS

      - name: Show extraction results
        run: |
          echo "=== Extraction stats ==="
          cat projects/wiki/output/client_extract/extraction_stats.json 2>/dev/null || echo "No stats"
          echo ""
          echo "=== Extracted files ==="
          find projects/wiki/output/client_extract -type f | head -50
          echo ""
          echo "=== Total extracted ==="
          find projects/wiki/output/client_extract -type f | wc -l
          echo "files"

      - name: Upload extraction results
        uses: actions/upload-artifact@v4
        with:
          name: game-data-extract-${{ github.run_id }}
          path: projects/wiki/output/client_extract/
          retention-days: 30

      - name: Commit extracted data to repo
        run: |
          TEXT_DIR="projects/wiki/output/client_extract/text"
          if [ ! -d "$TEXT_DIR" ] || [ -z "$(ls -A $TEXT_DIR 2>/dev/null)" ]; then
            echo "No text assets extracted, skipping commit"
            exit 0
          fi

          JSON_COUNT=$(find "$TEXT_DIR" -name "*.json" | wc -l)
          TOTAL_COUNT=$(find "$TEXT_DIR" -type f | wc -l)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/wiki/output/client_extract/text/
          git add projects/wiki/output/client_extract/extraction_stats.json 2>/dev/null || true
          git add projects/wiki/output/client_extract/schema_mapping_report.json 2>/dev/null || true

          # Also add portraits if extracted
          if [ -d "projects/wiki/output/client_extract/textures" ]; then
            git add projects/wiki/output/client_extract/textures/
          fi

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "feat(wiki): auto-extract game data from Steam client

          Extracted $JSON_COUNT JSON + $((TOTAL_COUNT - JSON_COUNT)) other config files.
          Source: Steam App ${{ github.event.inputs.steam_app_id || '3052450' }} via DepotDownloader (anonymous)
          [skip ci]"

          git pull origin main --rebase
          git push origin main
