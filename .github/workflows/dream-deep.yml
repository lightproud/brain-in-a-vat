name: "Dream: Deep Sleep"

# 深睡层 — 每日整理、趋势分析、知识缺口识别
# 使用 claude-code-action，需要 Claude 的分析能力

on:
  schedule:
    # Daily at 22:00 UTC (06:00 UTC+8, 早上上班前做完)
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: dream-deep
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  deep-sleep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_push: "true"
          prompt: |
            你是做梦 Agent（深睡层）。你的任务是在无人值守时自主整理项目记忆。

            ## 你要做的事

            ### 1. 日报趋势分析
            读取 projects/news/output/ 下最近 7 天的 daily-report-*.md（如果不足 7 天就用全部）。
            分析：
            - 各平台数据量趋势（上升/平稳/下降）
            - Steam 好评率变化
            - Discord 活跃度变化
            - 是否出现新的高频关键词
            - 联动关键词命中情况

            ### 2. Memory 一致性检查
            检查 memory/ 下所有 .md 文件的头部时间戳是否与 git log 一致。
            检查 CLAUDE.md 中引用的文件路径是否全部存在。
            检查 pending-discussions.md 中是否有已完成但未标记的条目（对比 decisions.md）。
            发现问题直接修正（更新时间戳、标记已完成项），不需要请示。

            ### 3. 知识缺口识别
            对比 assets/data/interview-2026-04.json 提到的实体（角色、机制、地点）与 projects/wiki/data/db/ 中的数据，列出"采访提到但数据库中缺失或不完整"的条目。

            ## 产出

            将以上分析写入 memory/dreams/YYYY-MM-DD.md（用今天的日期），格式：

            ```markdown
            # Deep Sleep — YYYY-MM-DD

            ## 趋势
            （简要描述，3-5 行）

            ## Memory 修正
            （列出自动修正的内容，或"无需修正"）

            ## 知识缺口
            （列出缺失项，每条一行）

            ## 洞察
            （如果发现了跨数据源的关联或值得关注的模式，写在这里）
            ```

            同时，如果发现了值得长期追踪的洞察，追加到 memory/dreams/insights.json 的 insights 数组中，格式：
            {"id": "insight-YYYY-MM-DD-NNN", "type": "trend|gap|anomaly|pattern", "summary": "...", "evidence": ["file1", "file2"], "suggested_action": "...", "auto_actionable": true/false}

            ## 行动边界
            - 可以直接修正：时间戳、已完成标记、明显笔误
            - 只记录不动手：架构建议、数据缺口、趋势判断
            - 提交信息前缀：dream(deep):

            完成后 git add 并 commit 所有变更。

      - name: Merge to main
        if: success()
        run: |
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" = "main" ] || [ -z "$BRANCH" ]; then
            exit 0
          fi
          git fetch origin main
          git checkout main
          git merge "$BRANCH" --no-edit || { git merge --abort; exit 1; }
          git push origin main
          # Delete remote branch (handle GitHub rename)
          git push origin --delete "$BRANCH" 2>/dev/null || \
          git push origin --delete "${BRANCH/claude\//brain-in-a-vat\/}" 2>/dev/null || true
