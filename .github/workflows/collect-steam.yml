name: Collect Steam Reviews

on:
  schedule:
    # 每日 UTC 02:00 运行（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "采集模式"
        required: false
        default: "24h"
        type: choice
        options:
          - 24h
          - 48h
          - all

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Steam collector (scheduled / default 24h)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == '24h')
        run: python projects/news/scripts/collectors/steam.py --hours 24

      - name: Run Steam collector (48h)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == '48h'
        run: python projects/news/scripts/collectors/steam.py --hours 48

      - name: Run Steam collector (all)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'all'
        run: python projects/news/scripts/collectors/steam.py --all

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/platforms/steam.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update steam reviews [skip ci]"
            git push
          fi
