name: "🩺 Code Health"

# 只在代码文件变动时触发，文档/数据改动不跑
# 日常巡检已由 dream.yml 浅睡层覆盖（每6h）
# 这里只补一层：代码改了就立刻验证

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'projects/biav/src/**'
  workflow_dispatch:

concurrency:
  group: code-health
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run code health checks
        id: health
        run: |
          OUTPUT=$(python scripts/code_health.py --report 2>&1)
          echo "$OUTPUT"
          REPORT=$(echo "$OUTPUT" | grep "^::health::" | sed 's/^::health:://')
          if [ -n "$REPORT" ]; then
            FAILED=$(echo "$REPORT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('failed',0))")
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          fi

      - name: Annotate if failures
        if: steps.health.outputs.failed > 0
        run: |
          echo "::warning::Code health: ${{ steps.health.outputs.failed }} checks failed. Run 'python scripts/code_health.py' locally for details."
