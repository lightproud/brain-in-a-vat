name: Fetch Wiki Data

on:
  schedule:
    - cron: '0 4 * * 1'  # 每周一 UTC 04:00
  push:
    branches: [main]
    paths:
      - 'projects/wiki/scripts/fetch_*.py'
      - '.github/workflows/fetch-wiki-data.yml'
  workflow_dispatch:
    inputs:
      tasks:
        description: '要执行的任务（逗号分隔：portraits,skills,cards,stats,stages,wheels,lore,all）'
        required: false
        default: 'all'

permissions:
  contents: write
  issues: write

defaults:
  run:
    working-directory: projects/wiki

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch portraits
        id: portraits
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'portraits') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_portraits.py
        continue-on-error: true

      - name: Fetch skills
        id: skills
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'skills') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_skills.py
        continue-on-error: true

      - name: Fetch cards
        id: cards
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'cards') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_cards.py
        continue-on-error: true

      - name: Fetch stats
        id: stats
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'stats') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_stats.py
        continue-on-error: true

      - name: Fetch stages
        id: stages
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'stages') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_stages.py
        continue-on-error: true

      - name: Fetch wheels
        id: wheels
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'wheels') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_wheels.py
        continue-on-error: true

      - name: Fetch lore
        id: lore
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'lore') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_lore.py
        continue-on-error: true

      - name: Regenerate character pages from updated data
        id: generate
        run: python3 scripts/generate_pages.py
        continue-on-error: true

      - name: Guard against corrupted data
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Checking core JSON files for corruption ==="
          for f in characters.json skills.json equipment.json realms.json combat.json; do
            filepath="projects/wiki/data/db/$f"
            if [ ! -f "$filepath" ]; then
              echo "SKIP: $filepath not found"
              continue
            fi
            size=$(wc -c < "$filepath")
            if [ "$size" -lt 100 ]; then
              echo "REVERT: $filepath appears corrupted ($size bytes), restoring from HEAD"
              git checkout HEAD -- "$filepath"
            elif ! python3 -m json.tool "$filepath" > /dev/null 2>&1; then
              echo "REVERT: $filepath is invalid JSON, restoring from HEAD"
              git checkout HEAD -- "$filepath"
            else
              echo "OK: $filepath ($size bytes)"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          cd $GITHUB_WORKSPACE
          git add projects/wiki/data/ projects/wiki/docs/ assets/images/portraits/
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(wiki): auto-update wiki data [skip ci]"
          git push

      - name: Alert on failures
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          FAILURES=""
          [ "${{ steps.portraits.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **portraits**: fetch_portraits.py failed"
          [ "${{ steps.skills.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **skills**: fetch_skills.py failed"
          [ "${{ steps.cards.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **cards**: fetch_cards.py failed"
          [ "${{ steps.stats.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **stats**: fetch_stats.py failed"
          [ "${{ steps.stages.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **stages**: fetch_stages.py failed"
          [ "${{ steps.wheels.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **wheels**: fetch_wheels.py failed"
          [ "${{ steps.lore.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **lore**: fetch_lore.py failed"
          [ "${{ steps.generate.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- **generate**: generate_pages.py failed"

          if [ -n "$FAILURES" ]; then
            echo "::error::Some fetch steps failed:$FAILURES"
            # Create a GitHub Issue to alert
            TITLE="[Code-wiki] fetch-wiki-data workflow 部分步骤失败 ($(date -u +%Y-%m-%d))"
            BODY="## fetch-wiki-data workflow 失败告警\n\n以下步骤执行失败：\n$FAILURES\n\n**Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n请检查日志并修复问题。"
            # Check for existing open issue with same title prefix to avoid duplicates
            SEARCH_PREFIX="[Code-wiki] fetch-wiki-data workflow 部分步骤失败"
            EXISTING=$(gh issue list --state open --search "$SEARCH_PREFIX" --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$(echo -e "$BODY")"
              echo "Updated existing issue #$EXISTING"
            else
              echo -e "$BODY" | gh issue create --title "$TITLE" --body-file -
              echo "Created new failure alert issue"
            fi
          else
            echo "All fetch steps succeeded!"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
