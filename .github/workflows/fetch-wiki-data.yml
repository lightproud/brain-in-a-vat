name: Fetch Wiki Data

on:
  schedule:
    - cron: '0 4 * * 1'  # 每周一 UTC 04:00
  push:
    branches: [main]
    paths:
      - 'projects/wiki/scripts/fetch_*.py'
      - '.github/workflows/fetch-wiki-data.yml'
  workflow_dispatch:
    inputs:
      tasks:
        description: '要执行的任务（逗号分隔：portraits,skills,cards,stats,stages,wheels,lore,all）'
        required: false
        default: 'all'

permissions:
  contents: write

defaults:
  run:
    working-directory: projects/wiki

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch portraits
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'portraits') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_portraits.py
        continue-on-error: true

      - name: Fetch skills
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'skills') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_skills.py
        continue-on-error: true

      - name: Fetch cards
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'cards') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_cards.py
        continue-on-error: true

      - name: Fetch stats
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'stats') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_stats.py
        continue-on-error: true

      - name: Fetch stages
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'stages') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_stages.py
        continue-on-error: true

      - name: Fetch wheels
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'wheels') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_wheels.py
        continue-on-error: true

      - name: Fetch lore
        if: >-
          github.event_name != 'workflow_dispatch' ||
          contains(github.event.inputs.tasks, 'lore') ||
          contains(github.event.inputs.tasks, 'all')
        run: python3 scripts/fetch_lore.py
        continue-on-error: true

      - name: Guard against corrupted data
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Checking core JSON files for corruption ==="
          for f in characters.json skills.json equipment.json realms.json combat.json; do
            filepath="projects/wiki/data/db/$f"
            if [ ! -f "$filepath" ]; then
              echo "SKIP: $filepath not found"
              continue
            fi
            size=$(wc -c < "$filepath")
            if [ "$size" -lt 100 ]; then
              echo "REVERT: $filepath appears corrupted ($size bytes), restoring from HEAD"
              git checkout HEAD -- "$filepath"
            elif ! python3 -m json.tool "$filepath" > /dev/null 2>&1; then
              echo "REVERT: $filepath is invalid JSON, restoring from HEAD"
              git checkout HEAD -- "$filepath"
            else
              echo "OK: $filepath ($size bytes)"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          cd $GITHUB_WORKSPACE
          git add projects/wiki/data/ assets/images/portraits/
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(wiki): auto-update wiki data [skip ci]"
          git push
