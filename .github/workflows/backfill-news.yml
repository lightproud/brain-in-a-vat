name: Backfill Historical News

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to backfill (leave empty for all)'
        required: false
        type: string
      pages:
        description: 'Pages to fetch per platform (default 5)'
        required: false
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  # Matrix strategy: each platform runs as a separate parallel job
  backfill:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bilibili
          - appstore
          - steam_review
          - arca_live
          - dcinside
          - naver_cafe
          - pixiv
          - ruliweb
          - weixin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip matrix entries when a specific platform is requested
    if: >-
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == null ||
      github.event.inputs.platform == matrix.platform
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Pull latest backfill state
        run: |
          git pull --rebase origin main || true

      - name: "Run backfill: ${{ matrix.platform }}"
        run: |
          PAGES="${{ github.event.inputs.pages || '5' }}"
          python projects/news/scripts/backfill_platforms.py --platform ${{ matrix.platform }} --pages $PAGES

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: backfill ${{ matrix.platform }} historical data [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
