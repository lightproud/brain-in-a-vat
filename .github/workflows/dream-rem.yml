name: "Dream: REM"

# REM 层 — 每周深度洞察、经验提炼、状态同步
# 使用 claude-code-action，产出周报和 memory 更新

on:
  schedule:
    # Every Monday at 21:00 UTC (05:00 UTC+8 Tuesday)
    - cron: '0 21 * * 1'
  workflow_dispatch:

concurrency:
  group: dream-rem
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  rem-sleep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_push: "true"
          prompt: |
            你是做梦 Agent（REM 层）。你的任务是进行每周深度反思和知识整理。

            ## 你要做的事

            ### 1. 一周回顾
            运行 `git log --oneline --since="7 days ago"` 查看本周所有 commit。
            分析：
            - 本周完成了哪些重要工作
            - 哪些子项目最活跃
            - 是否有失败的 workflow 或被 revert 的 commit

            ### 2. 经验提炼
            检查本周 commit 中是否有：
            - 反复出现的问题模式（同类 bug 修了多次）
            - 值得记录的新发现（但还没写入 lessons-learned.md）
            - 跨子项目的协调问题
            如果发现值得记录的经验，追加到 memory/lessons-learned.md（保持编号连续、格式一致）。

            ### 3. project-status.md 自动同步
            读取各子项目的实际文件状态：
            - projects/news/: 检查脚本数量、output 文件时间、workflow 配置
            - projects/wiki/: 检查数据文件数量、页面数量
            - projects/site/: 检查部署配置
            与 memory/project-status.md 对比，发现不一致就更新。

            ### 4. pending-discussions.md 清理
            检查 pending-discussions.md 中的每一条待办：
            - 对比 decisions.md，已决策的标记 [x]
            - 对比实际文件，已实现的标记 [x]
            - 移除已关闭超过 2 周的条目

            ### 5. 洞察整合
            读取本周所有 memory/dreams/YYYY-MM-DD.md（深睡日志），提炼跨天的趋势。
            将有价值的洞察合并到 memory/dreams/insights.json。

            ### 6. 下周建议
            基于以上分析，给出 3-5 条具体的下周工作建议。

            ## 产出

            写入 memory/dreams/YYYY-WNN-weekly.md，格式：

            ```markdown
            # REM Weekly — YYYY-WNN

            ## 本周概况
            - X 个 commit，Y 个 Issue 关闭
            - 最活跃：[子项目名]
            - 关键里程碑：...

            ## 经验提炼
            （新增到 lessons-learned.md 的条目列表，或"无新增"）

            ## Memory 同步
            （更新了哪些 memory 文件，或"无需更新"）

            ## 洞察
            （本周跨天/跨源的关联发现）

            ## 下周建议
            1. ...
            2. ...
            3. ...
            ```

            ## 行动边界
            - 可以直接修正：project-status.md、pending-discussions.md、lessons-learned.md、时间戳
            - 只记录不动手：架构建议、新功能提议、资源分配建议
            - 提交信息前缀：dream(rem):

            完成后 git add 并 commit 所有变更。

      - name: Merge to main
        if: success()
        run: |
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" = "main" ] || [ -z "$BRANCH" ]; then
            exit 0
          fi
          git fetch origin main
          git checkout main
          git merge "$BRANCH" --no-edit || { git merge --abort; exit 1; }
          git push origin main
          git push origin --delete "$BRANCH" 2>/dev/null || \
          git push origin --delete "${BRANCH/claude\//brain-in-a-vat\/}" 2>/dev/null || true

      - name: Post weekly summary as Issue comment
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find this week's report
            const dreamsDir = 'memory/dreams';
            const files = fs.readdirSync(dreamsDir).filter(f => f.includes('-weekly.md')).sort().reverse();
            if (files.length === 0) return;

            const content = fs.readFileSync(path.join(dreamsDir, files[0]), 'utf-8');
            const suggestions = content.split('## 下周建议')[1] || '';

            if (!suggestions.trim()) return;

            // Check if there's an open dream issue to comment on
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dream',
              state: 'open',
              per_page: 1,
            });

            const body = `## REM Weekly Report\n\n${suggestions.trim()}\n\n_Full report: \`${files[0]}\`_`;

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            }
