name: Discord Archive

on:
  schedule:
    # Incremental: every 3 hours
    - cron: '0 */3 * * *'
    # Monthly archive: 1st of each month at 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:

concurrency:
  group: discord-archive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Run Discord archiver
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python projects/news/scripts/discord_archiver.py
        timeout-minutes: 290

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/discord/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: archive Discord data [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
