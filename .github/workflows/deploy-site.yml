name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'projects/site/**'
      - 'projects/wiki/docs/**'
      - 'projects/wiki/package.json'
      - 'projects/news/index.html'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/wiki/package-lock.json

      - name: Install wiki dependencies
        working-directory: projects/wiki
        run: npm ci

      - name: Build wiki
        working-directory: projects/wiki
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p dist/wiki dist/news

          cp site/index.html dist/
          cp -r projects/wiki/docs/.vitepress/dist/* dist/wiki/
          cp projects/news/index.html dist/news/index.html
          touch dist/.nojekyll

      - name: Verify build output
        run: |
          echo "=== dist root ==="
          ls -la dist/
          echo ""
          echo "=== index.html title ==="
          grep '<title>' dist/index.html
          echo ""
          for f in dist/index.html dist/wiki/index.html dist/news/index.html; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" && exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done
          echo "Total files: $(find dist -type f | wc -l)"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
