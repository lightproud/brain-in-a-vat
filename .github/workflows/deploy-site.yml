# Auto-deploy BIAV site + wiki + news + biva to GitHub Pages
name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'projects/site/**'
      - 'projects/wiki/docs/**'
      - 'projects/wiki/package.json'
      - 'projects/news/index.html'
      - 'projects/biva/**'
      - 'deliverables/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/wiki/package-lock.json

      - name: Install wiki dependencies
        working-directory: projects/wiki
        run: npm ci

      - name: Build wiki
        working-directory: projects/wiki
        run: npm run build

      - name: Assemble site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p dist/wiki dist/news dist/shared

          cp projects/site/public/index.html dist/
          [ -f projects/site/public/404.html ] && cp projects/site/public/404.html dist/404.html
          [ -d projects/site/design ] && cp -r projects/site/design dist/design
          cp -r projects/wiki/docs/.vitepress/dist/* dist/wiki/
          cp projects/news/index.html dist/news/index.html
          mkdir -p dist/biva
          if [ -f projects/biva/index.html ]; then
            sed "s|%%ANTHROPIC_API_KEY%%|${ANTHROPIC_API_KEY}|g" projects/biva/index.html > dist/biva/index.html
          fi
          [ -f projects/biva/manifest.json ] && cp projects/biva/manifest.json dist/biva/manifest.json
          [ -f projects/biva/sw.js ] && cp projects/biva/sw.js dist/biva/sw.js
          mkdir -p dist/news/data dist/biva/data
          [ -f projects/news/output/news.json ] && cp projects/news/output/news.json dist/news/data/news.json
          # BIVA live context: deploy all key data files
          for f in memory/boot-snapshot.md memory/project-status.md memory/strategic-assessment.md \
                   memory/morimens-context.md memory/methodology.md memory/decisions.md \
                   memory/lessons-learned.md memory/strategic-plan-2026.md; do
            [ -f "$f" ] && cp "$f" "dist/biva/data/$(basename $f)"
          done
          [ -f BIAV-SC.md ] && cp BIAV-SC.md dist/biva/data/BIAV-SC.md
          [ -f projects/news/output/daily-latest.md ] && cp projects/news/output/daily-latest.md dist/biva/data/daily-latest.md
          [ -f projects/news/output/all-latest.json ] && cp projects/news/output/all-latest.json dist/biva/data/all-latest.json
          [ -f assets/data/design-decisions.json ] && cp assets/data/design-decisions.json dist/biva/data/design-decisions.json
          [ -f assets/data/interview-2026-04.json ] && cp assets/data/interview-2026-04.json dist/biva/data/interview-2026-04.json
          [ -f assets/data/narrative-structure.json ] && cp assets/data/narrative-structure.json dist/biva/data/narrative-structure.json
          [ -d assets/styles ] && cp -r assets/styles/* dist/shared/
          mkdir -p dist/docs
          [ -f "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.html" ] && cp "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.html" dist/docs/brain-in-a-vat-project.html
          [ -f "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.pdf" ] && cp "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.pdf" dist/docs/brain-in-a-vat-project.pdf
          touch dist/.nojekyll

      - name: Verify build output
        run: |
          echo "=== dist root ==="
          ls -la dist/
          echo ""
          echo "=== index.html title ==="
          grep '<title>' dist/index.html
          echo ""
          for f in dist/index.html dist/wiki/index.html dist/news/index.html dist/biva/index.html; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" && exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done
          echo "Total files: $(find dist -type f | wc -l)"

      - name: Enhanced build verification
        run: |
          echo "=== Checking HTML files are not empty ==="
          for f in $(find dist -name '*.html'); do
            if ! grep -q '<html' "$f" 2>/dev/null; then
              echo "WARNING: $f may be empty or corrupted"
            else
              echo "OK: $f"
            fi
          done
          echo ""
          echo "=== Checking wiki locale directories ==="
          # zh is the root locale via VitePress rewrites (zh/:rest* → :rest*)
          if [ -f "dist/wiki/index.html" ]; then
            echo "OK: dist/wiki/ (zh root) exists ($(find dist/wiki -maxdepth 1 -name '*.html' | wc -l) html files at root)"
          else
            echo "WARNING: dist/wiki/index.html missing"
          fi
          for locale in en ja; do
            if [ -d "dist/wiki/$locale" ]; then
              echo "OK: dist/wiki/$locale/ exists ($(find dist/wiki/$locale -type f | wc -l) files)"
            else
              echo "WARNING: dist/wiki/$locale/ missing"
            fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Post-deploy smoke test
        continue-on-error: true
        run: |
          echo "Waiting 30s for GitHub Pages to propagate..."
          sleep 30
          BASE="https://lightproud.github.io/brain-in-a-vat"
          # zh content is at /wiki/ root (via VitePress rewrites), not /wiki/zh/
          for url in "$BASE/" "$BASE/wiki/" "$BASE/wiki/en/" "$BASE/news/" "$BASE/biva/"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "OK: $url → $status"
            else
              echo "WARNING: $url → $status (may need more time to propagate)"
            fi
          done
