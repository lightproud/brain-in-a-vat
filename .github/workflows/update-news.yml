name: Update Community News

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Run aggregator
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python projects/news/scripts/aggregator.py

      - name: Run global collectors (29 platforms)
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_IDS: ${{ secrets.FACEBOOK_PAGE_IDS }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_ACCESS_TOKEN: ${{ secrets.TWITCH_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          DC_GALLERY_ID: ${{ secrets.DC_GALLERY_ID }}
          QQ_CHANNEL: ${{ secrets.QQ_CHANNEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: python projects/news/scripts/collect_global.py

      - name: Split output by platform
        run: python projects/news/scripts/split_output.py

      - name: Generate daily report
        run: python projects/news/scripts/generate_daily.py

      - name: Download media (images, covers, fan art)
        run: python projects/news/scripts/download_media.py --max-downloads 100

      - name: Archive platform data by date
        run: python projects/news/scripts/archive_platforms.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/output/ projects/news/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update community news [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
