name: Claude Code
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude:
    if: github.event.issue.user.login == 'lightproud'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
