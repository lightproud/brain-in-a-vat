<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘却前夜 Morimens - 全球社区热点聚合</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #111219;
            --bg-card: #1e1a10;
            --bg-card-hover: #241f14;
            --text-primary: #d4c9a8;
            --text-secondary: #b5aa98;
            --text-muted: #6b6040;
            --accent-gold: #c5a356;
            --accent-gold-bright: #e2c97e;
            --accent-gold-dark: #8a7a48;
            --accent-positive: #7aad5a;
            --accent-negative: #c25a4a;
            --accent-amber: #e2c97e;
            --border-color: #2a2515;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 500;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 2.0;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(197,163,86,0.07) 0%, transparent 65%);
            pointer-events: none;
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold-bright);
            margin-bottom: 0.5rem;
        }

        .header h1 span.game-title {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .header-meta {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.5rem;
        }

        .header-meta .update-time {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #7aad5a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Filter tabs */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: var(--bg-secondary);
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent-gold);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: white;
        }

        /* Main content */
        .main-content {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Summary section */
        .daily-summary {
            background: rgba(197, 163, 86, 0.05);
            border: 1px solid rgba(197, 163, 86, 0.15);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .daily-summary h2 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .daily-summary p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .daily-summary .highlight {
            color: var(--accent-amber);
            font-weight: 600;
        }

        /* News cards */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .news-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-gold);
            transform: translateY(-1px);
        }

        .news-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            gap: 0.75rem;
        }

        .news-card-title {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            flex: 1;
        }

        .news-card-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .news-card-title a:hover {
            color: var(--accent-gold);
        }

        .hot-badge {
            background: linear-gradient(135deg, #c25a4a, #c5a356);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .news-card-summary {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            line-height: 1.7;
        }

        .news-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .source-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.15rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .source-reddit { background: rgba(255, 69, 0, 0.15); color: #ff6b35; }
        .source-twitter { background: rgba(29, 155, 240, 0.15); color: #1d9bf0; }
        .source-bilibili { background: rgba(0, 174, 236, 0.15); color: #00aeec; }
        .source-taptap { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .source-nga { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .source-discord { background: rgba(88, 101, 242, 0.15); color: #5865f2; }
        .source-youtube { background: rgba(255, 0, 0, 0.15); color: #ff4444; }
        .source-official { background: rgba(197, 163, 86, 0.15); color: #c5a356; }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Topic tags */
        .topic-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .topic-tag {
            font-size: 0.72rem;
            padding: 0.15rem 0.5rem;
            border-radius: 8px;
            background: rgba(197, 163, 86, 0.1);
            color: var(--accent-gold);
            border: 1px solid rgba(197, 163, 86, 0.2);
        }

        /* Loading & empty states */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .footer a {
            color: var(--accent-gold);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .stats-bar { gap: 1rem; }
            .stat-value { font-size: 1.1rem; }
            .main-content { padding: 1rem; }
            .news-card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>
            忘却前夜 社区热点聚合
            <span class="game-title">忘卻前夜 / Morimens - Global Community News</span>
        </h1>
        <div class="header-meta">
            <span class="update-time">
                <span class="pulse-dot"></span>
                <span id="update-time">加载中...</span>
            </span>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="stat-total">--</div>
            <div class="stat-label">热点话题</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-sources">--</div>
            <div class="stat-label">数据源</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-engagement">--</div>
            <div class="stat-label">总互动量</div>
        </div>
    </div>

    <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="official">官方公告</button>
        <button class="filter-btn" data-filter="reddit">Reddit</button>
        <button class="filter-btn" data-filter="twitter">Twitter/X</button>
        <button class="filter-btn" data-filter="bilibili">B站</button>
        <button class="filter-btn" data-filter="taptap">TapTap</button>
        <button class="filter-btn" data-filter="nga">NGA</button>
        <button class="filter-btn" data-filter="discord">Discord</button>
        <button class="filter-btn" data-filter="youtube">YouTube</button>
    </div>

    <main class="main-content">
        <section class="daily-summary" id="daily-summary">
            <h2>今日总结</h2>
            <p id="summary-text">加载中...</p>
        </section>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在加载社区热点...</p>
        </div>

        <div class="news-list" id="news-list"></div>

        <div class="empty-state" id="empty-state" style="display:none;">
            <p>暂无该分类的热点内容</p>
        </div>
    </main>

    <footer class="footer">
        <p>忘却前夜 Morimens 社区热点聚合 &mdash; 数据每小时自动更新</p>
        <p style="margin-top:0.5rem;">
            数据来源：Reddit · Twitter/X · Bilibili · TapTap · NGA · Discord · YouTube
        </p>
    </footer>

    <script>
        const DATA_URL = 'data/news.json';
        const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 minutes

        let allNews = [];
        let currentFilter = 'all';

        // Source display config
        const SOURCE_CONFIG = {
            reddit:   { label: 'Reddit',    class: 'source-reddit' },
            twitter:  { label: 'Twitter/X', class: 'source-twitter' },
            bilibili: { label: 'B站',       class: 'source-bilibili' },
            taptap:   { label: 'TapTap',    class: 'source-taptap' },
            nga:      { label: 'NGA',       class: 'source-nga' },
            discord:  { label: 'Discord',   class: 'source-discord' },
            youtube:  { label: 'YouTube',   class: 'source-youtube' },
            official: { label: '官方',      class: 'source-official' },
        };

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return '刚刚';
            if (diffMin < 60) return `${diffMin} 分钟前`;
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return `${diffHr} 小时前`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function formatNumber(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return String(n);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderCard(item) {
            const src = SOURCE_CONFIG[item.source] || { label: escapeHtml(item.source), class: '' };
            const hotBadge = item.is_hot ? `<span class="hot-badge">HOT</span>` : '';
            const tags = (item.tags || []).map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('');
            const safeTitle = escapeHtml(item.title);
            const link = item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${safeTitle}</a>` : safeTitle;

            return `
                <article class="news-card" data-source="${item.source}">
                    <div class="news-card-header">
                        <div class="news-card-title">${link}</div>
                        ${hotBadge}
                    </div>
                    <div class="news-card-summary">${escapeHtml(item.summary || '')}</div>
                    <div class="news-card-meta">
                        <span class="source-tag ${src.class}">${src.label}</span>
                        <span class="meta-item">${formatTime(item.time)}</span>
                        ${item.engagement ? `<span class="meta-item">${formatNumber(item.engagement)} 互动</span>` : ''}
                        ${item.author ? `<span class="meta-item">${escapeHtml(item.author)}</span>` : ''}
                    </div>
                    ${tags ? `<div class="topic-tags">${tags}</div>` : ''}
                </article>
            `;
        }

        function renderNews() {
            const list = document.getElementById('news-list');
            const empty = document.getElementById('empty-state');

            const filtered = currentFilter === 'all'
                ? allNews
                : allNews.filter(n => n.source === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
            } else {
                list.innerHTML = filtered.map(renderCard).join('');
                empty.style.display = 'none';
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.news.length;
            const sources = new Set(data.news.map(n => n.source));
            document.getElementById('stat-sources').textContent = sources.size;
            const totalEngagement = data.news.reduce((s, n) => s + (n.engagement || 0), 0);
            document.getElementById('stat-engagement').textContent = formatNumber(totalEngagement);
        }

        async function loadData() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('Fetch failed');
                const data = await res.json();

                allNews = data.news.sort((a, b) => {
                    if (a.is_hot !== b.is_hot) return b.is_hot ? 1 : -1;
                    return new Date(b.time) - new Date(a.time);
                });

                document.getElementById('update-time').textContent =
                    `最后更新：${new Date(data.updated_at).toLocaleString('zh-CN')}`;

                if (data.summary) {
                    document.getElementById('summary-text').innerHTML = data.summary;
                }

                updateStats(data);
                renderNews();
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('Failed to load news data:', err);
                document.getElementById('loading').innerHTML =
                    '<p>数据加载失败，请稍后刷新重试。</p>';
            }
        }

        // Filter buttons
        document.getElementById('filter-bar').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            renderNews();
        });

        // Initial load & auto-refresh
        loadData();
        setInterval(loadData, AUTO_REFRESH_MS);
    </script>
</body>
</html>
