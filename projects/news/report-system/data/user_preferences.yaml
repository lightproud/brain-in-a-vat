# ================================================
# 忘却前夜 报告系统 - 私人偏好配置
# 这里的内容会作为"你的声音"传递给私人 Claude
# 修改后下次运行即生效
# ================================================

# --- 你是谁 ---
identity: |
  我是一名忘却前夜的深度玩家。

# --- 关注重点 (越靠前优先级越高) ---
focus_topics:
  - 版本更新与前瞻
  - 角色强度与配队
  - 官方公告与联动
  - 社区争议与舆情
  - 同人创作

# --- 高优先关键词 (出现这些词的内容会被重点标记) ---
priority_keywords:
  - 前瞻直播
  - 新角色
  - 联动
  - 平衡性
  - bug
  - 补偿
  - 停服

# --- 你希望 Claude 用什么风格写报告 ---
report_style: |
  简洁专业，像一个私人情报官在做晨间简报。
  先说最重要的事，再展开细节。
  如果发现异常趋势（比如突然的负面爆发），要主动提醒。
  对比昨天/上周的变化时，用具体数据说话。

# --- 你希望忽略的内容 ---
ignore_keywords:
  - 水贴
  - 抽卡晒图

# --- 报告语言 ---
language: zh

# --- 额外指令 (自由发挥) ---
custom_instructions: |
  如果某个话题连续3天出现在热点中，标记为"持续热议"。
  如果某个角色相关讨论突然增加，分析可能原因（新卡池？平衡调整？）。
  每周五的报告额外加一段"本周总结"。
