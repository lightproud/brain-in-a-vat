<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>缸中之脑 / Brain in a Vat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="缸中之脑">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b10">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark-dimmed.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
/* ===== Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0b10;color:#d4c9a8;font-family:'Noto Sans SC',sans-serif;font-weight:500}
::selection{background:rgba(197,163,86,.3);color:#e2c97e}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0b10}
::-webkit-scrollbar-thumb{background:#2a2515;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3520}

/* ===== Layout ===== */
#app{display:flex;height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden}
#main-area{display:flex;flex:1;min-width:0;min-height:0;overflow:hidden}
#chat-col{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0;overflow:hidden}

/* Artifacts panel */
#artifacts{display:none;width:45%;max-width:560px;border-left:1px solid #2a2515;flex-direction:column;background:#0a0b10}
#artifacts.open{display:flex}
#artifacts-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #2a2515;gap:8px}
#artifacts-header .art-title{flex:1;font-size:13px;color:#e2c97e;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-tab{padding:4px 10px;border-radius:4px;border:1px solid #2a2515;background:none;color:#6b6040;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.art-tab:hover{border-color:#8a7a48;color:#d4c9a8}
.art-tab.active{background:#1e1a10;color:#e2c97e;border-color:#8a7a48}
#art-close{background:none;border:none;color:#5a5540;cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
#art-close:hover{color:#d4c9a8}
#art-code-view{flex:1;overflow:auto;padding:12px;font-size:13px;line-height:1.6;font-family:Menlo,Consolas,monospace;background:#1e1a10;color:#d4c9a8;white-space:pre-wrap}
#art-preview-view{flex:1;overflow:auto;background:#fff;border:none}
#art-preview-view iframe{width:100%;height:100%;border:none}
.art-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid #2a2515}
.art-footer .copy-btn{font-size:12px;padding:4px 12px}

/* Sidebar */
#sidebar{width:280px;display:flex;flex-direction:column;border-right:1px solid #2a2515;flex-shrink:0;transition:transform .25s ease;position:relative;z-index:90}
#sidebar.hidden{transform:translateX(-100%);position:absolute;height:100%}
#sidebar-header{padding:12px 16px;border-bottom:1px solid #2a2515;display:flex;align-items:center;justify-content:space-between}
#sidebar-header h1{font-family:'Noto Serif SC',serif;color:#e2c97e;font-size:16px;font-weight:700;letter-spacing:2px}
#sidebar-header p{color:#5a5540;font-size:11px}

/* Sidebar tabs */
.sb-tabs{display:flex;border-bottom:1px solid #2a2515;padding:0 4px;flex-shrink:0}
.sb-tab{flex:1;padding:8px 2px;text-align:center;font-size:10px;color:#5a5540;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-tab svg{width:16px;height:16px}
.sb-tab:hover{color:#d4c9a8}
.sb-tab.active{color:#e2c97e;border-bottom-color:#c5a356}
.sb-panel{flex:1;overflow-y:auto;display:none}
.sb-panel.active{display:flex;flex-direction:column}

/* Chat panel */
#new-chat-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:8px;padding:8px 12px;border-radius:8px;border:1px solid #2a2515;background:transparent;color:#6b6040;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;flex-shrink:0}
#new-chat-btn:hover{border-color:#8a7a48;color:#c5a356}
#conv-list{flex:1;overflow-y:auto;padding:4px 8px}
.conv-item{display:flex;align-items:center;padding:8px 10px;margin-bottom:2px;border-radius:8px;cursor:pointer;font-size:13px;color:#6b6040;transition:all .15s}
.conv-item:hover{background:#1e1a10;color:#d4c9a8}
.conv-item.active{background:#1e1a10;border:1px solid #2a2515;color:#e2c97e}
.conv-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-del{opacity:0;background:none;border:none;color:#5a5540;cursor:pointer;padding:4px;font-size:12px;transition:opacity .15s}
.conv-item:hover .conv-del{opacity:1}
.conv-del:hover{color:#c25a4a}

/* Projects panel */
.proj-item{padding:10px 12px;margin:2px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.proj-item:hover{background:#1e1a10;border-color:#2a2515}
.proj-item.active{background:#1e1a10;border-color:#8a7a48}
.proj-item .proj-name{font-size:13px;color:#d4c9a8;font-weight:500}
.proj-item .proj-desc{font-size:11px;color:#5a5540;margin-top:2px}
.proj-item .proj-badge{display:inline-block;font-size:9px;color:#8a7a48;background:#1e1a10;padding:1px 6px;border-radius:3px;margin-top:4px}

/* Files panel */
.file-tree{padding:4px 8px}
.ft-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#6b6040;transition:all .12s}
.ft-item:hover{background:#1e1a10;color:#d4c9a8}
.ft-item.dir{color:#8a7a48;font-weight:500}
.ft-back{color:#5a5540;font-style:italic}
.ft-path{padding:6px 12px;font-size:11px;color:#5a5540;border-bottom:1px solid #2a2515;font-family:Menlo,Consolas,monospace;word-break:break-all;flex-shrink:0}

/* Memory panel */
.mem-item{padding:8px 12px;margin:2px 8px;border-radius:6px;font-size:12px;color:#d4c9a8;line-height:1.5;border:1px solid #2a2515;display:flex;gap:8px;align-items:flex-start}
.mem-item:hover{background:#1e1a10}
.mem-text{flex:1;word-break:break-word}
.mem-time{font-size:10px;color:#5a5540;white-space:nowrap;flex-shrink:0}
.mem-del{background:none;border:none;color:#5a5540;cursor:pointer;font-size:12px;padding:0 2px;flex-shrink:0;transition:color .15s}
.mem-del:hover{color:#c25a4a}
.mem-empty{padding:20px;text-align:center;color:#5a5540;font-size:12px}
.mem-actions{display:flex;gap:6px;padding:8px;flex-shrink:0}
.mem-actions button{flex:1;padding:6px;border-radius:6px;border:1px solid #2a2515;background:none;color:#6b6040;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.mem-actions button:hover{border-color:#8a7a48;color:#d4c9a8}
.mem-actions button.danger:hover{border-color:#c25a4a;color:#c25a4a}

/* Tools panel */
.tool-card{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.tool-card:hover{background:#1e1a10;border-color:#2a2515}
.tool-icon{width:32px;height:32px;border-radius:6px;background:#1e1a10;border:1px solid #2a2515;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tool-info{flex:1;min-width:0}
.tool-info .tool-name{font-size:12px;color:#d4c9a8;font-weight:500}
.tool-info .tool-desc{font-size:10px;color:#5a5540;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-section{padding:6px 12px;font-size:10px;color:#8a7a48;font-weight:700;text-transform:uppercase;letter-spacing:1px}

#sidebar-footer{padding:8px 12px;border-top:1px solid #2a2515;text-align:center;color:#5a5540;font-size:11px;flex-shrink:0}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

/* Top bar */
#topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #2a2515;flex-shrink:0;overflow:visible;position:relative;z-index:50}
#toggle-sidebar{background:none;border:none;color:#6b6040;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#toggle-sidebar:hover{color:#d4c9a8;background:#1e1a10}
#model-select-wrap{position:relative}
#model-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:#1e1a10;border:1px solid #2a2515;color:#6b6040;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0}
#model-btn:hover{border-color:#8a7a48;color:#d4c9a8}
#model-btn .provider-tag{color:#c5a356;font-size:11px;font-weight:700}
#model-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;width:300px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;z-index:500;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#model-dropdown.open{display:block}
.provider-group-label{padding:8px 12px;font-size:11px;font-weight:700;color:#8a7a48;border-bottom:1px solid #2a2515;display:flex;align-items:center;gap:6px}
.provider-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.provider-dot.on{background:#7aad5a}
.provider-dot.off{background:#c25a4a}
.model-option{display:block;width:100%;text-align:left;padding:8px 16px;font-size:13px;color:#d4c9a8;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:background .1s}
.model-option:hover{background:#241f14}
.model-option.selected{color:#e2c97e;background:#241f14}
#stop-btn{display:none;flex-shrink:0;width:40px;height:40px;border-radius:12px;border:none;background:#c25a4a;color:#fff;cursor:pointer;align-items:center;justify-content:center;transition:background .15s}
#stop-btn:hover{background:#d96a5a}

/* Messages area */
#messages{flex:1;overflow-y:auto;min-height:0}
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;gap:8px}
.greeting-icon{font-size:40px;color:#c5a356;margin-bottom:4px}
#empty-state h2{font-family:'Noto Serif SC',serif;font-size:26px;color:#d4c9a8;font-weight:700;margin-bottom:16px}
.quick-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin-top:8px}
.quick-chip{padding:8px 16px;border-radius:20px;border:1px solid #2a2515;background:#1e1a10;color:#8a7a48;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.quick-chip:hover{border-color:#8a7a48;color:#d4c9a8;background:#241f14}
#empty-state .ver{color:#3a3520;font-size:11px;margin-top:24px;letter-spacing:1px}
#msg-container{max-width:720px;margin:0 auto;padding:24px 16px}

/* Message entrance animation */
.msg{margin-bottom:16px;animation:msgIn 0.25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Loading indicator (thinking dots) */
.thinking-dots{display:flex;align-items:center;gap:5px;padding:8px 0}
.thinking-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c5a356;animation:dotPulse 1.2s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:0.15s}
.thinking-dots span:nth-child(3){animation-delay:0.3s}
@keyframes dotPulse{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

/* Send button click animation */
@keyframes sendPop{0%{transform:scale(1)}50%{transform:scale(.88)}100%{transform:scale(1)}}
.send-pop{animation:sendPop .2s ease-out}

/* Message bubbles */
.msg{margin-bottom:16px}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{max-width:75%;padding:12px 16px;border-radius:16px 16px 4px 16px;background:#1e1a10;border:1px solid #2a2515;font-size:14px;line-height:1.8;white-space:pre-wrap}
.msg-assistant{display:flex;gap:12px}
.msg-content{min-width:0;max-width:85%;font-size:14px;line-height:1.8}

/* Markdown in assistant messages */
.msg-content h1,.msg-content h2,.msg-content h3{font-family:'Noto Serif SC',serif;color:#e2c97e;font-weight:700;margin:1em 0 .5em}
.msg-content h1{font-size:1.4em}.msg-content h2{font-size:1.2em}.msg-content h3{font-size:1.05em}
.msg-content p{margin:.5em 0}
.msg-content ul,.msg-content ol{padding-left:1.5em;margin:.4em 0}
.msg-content li{margin:.2em 0;line-height:1.7}
.msg-content li::marker{color:#c5a356}
.msg-content code{background:#1e1a10;color:#e2c97e;padding:2px 6px;border-radius:3px;font-size:.9em;font-family:Menlo,Consolas,monospace}
.msg-content pre{background:#1e1a10;border:1px solid #2a2515;border-radius:6px;overflow-x:auto;margin:.8em 0;position:relative}
.msg-content pre code{background:none;padding:12px;display:block;font-size:.85em;line-height:1.6}
.msg-content pre code.hljs{background:#1e1a10!important}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#161210;border-bottom:1px solid #2a2515;font-size:11px;color:#8a7a48}
.code-lang{font-weight:700;text-transform:uppercase}
.copy-btn{background:none;border:1px solid #2a2515;color:#6b6040;font-size:11px;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all .15s}
.copy-btn:hover{border-color:#8a7a48;color:#d4c9a8}
.copy-btn.copied{color:#7aad5a;border-color:#7aad5a}
.msg-content blockquote{border-left:3px solid #c5a356;padding-left:1em;color:#8a7a48;margin:.8em 0}
.msg-content table{width:100%;border-collapse:collapse;margin:.8em 0;font-size:.9em}
.msg-content th{background:#1e1a10;color:#e2c97e;font-weight:700;padding:6px 10px;border:1px solid #2a2515;text-align:left}
.msg-content td{padding:6px 10px;border:1px solid #2a2515}
.msg-content tr:nth-child(even) td{background:rgba(197,163,86,.04)}
.msg-content a{color:#c5a356;text-decoration:none}
.msg-content a:hover{color:#e2c97e;text-decoration:underline}
.msg-content strong{color:#e2c97e;font-weight:700}
.msg-content hr{border:none;border-top:1px solid #2a2515;margin:1em 0}

/* Thinking block (Extended Thinking L6) */
.thinking-block{margin:.8em 0;border:1px solid #2a2515;border-radius:6px;overflow:hidden}
.thinking-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#161210;color:#6b6040;font-size:12px;cursor:pointer;width:100%;border:none;font-family:inherit;text-align:left;transition:color .15s}
.thinking-toggle:hover{color:#d4c9a8}
.thinking-toggle svg{transition:transform .2s}
.thinking-toggle.open svg{transform:rotate(90deg)}
.thinking-content{display:none;padding:10px 12px;font-size:12.5px;line-height:1.7;color:#5a5540;border-top:1px solid #2a2515;background:#0d0c08}
.thinking-content.open{display:block}

/* Edit message (L7) */
.msg-user{position:relative}
.msg-edit-btn{display:none;position:absolute;left:-30px;top:50%;transform:translateY(-50%);background:none;border:none;color:#3a3520;cursor:pointer;padding:4px;transition:color .15s}
.msg-user:hover .msg-edit-btn{display:block}
.msg-edit-btn:hover{color:#c5a356}
.msg-edit-wrap{display:flex;flex-direction:column;gap:8px;max-width:75%}
.msg-edit-wrap textarea{width:100%;padding:10px 14px;border-radius:12px;background:#1e1a10;border:1px solid #2a2515;color:#d4c9a8;font-size:14px;font-family:inherit;line-height:1.6;outline:none;resize:vertical;min-height:60px}
.msg-edit-wrap textarea:focus{border-color:#8a7a48}
.msg-edit-actions{display:flex;gap:6px;justify-content:flex-end}
.msg-edit-actions button{padding:4px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid #2a2515;transition:all .15s}
.msg-edit-actions .save{background:#c5a356;color:#0a0b10;border-color:#c5a356}
.msg-edit-actions .cancel{background:none;color:#6b6040}

/* Message action bar (copy/retry) */
.msg-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .15s}
.msg-assistant:hover .msg-actions,.msg-actions.visible{opacity:1}
.msg-act-btn{background:none;border:1px solid transparent;color:#5a5540;cursor:pointer;padding:3px 8px;border-radius:5px;font-size:11px;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .15s}
.msg-act-btn:hover{color:#d4c9a8;border-color:#2a2515;background:#1e1a10}
.msg-act-btn.copied{color:#7aad5a}
.msg-act-btn svg{width:13px;height:13px}

/* Token usage */
.token-usage{font-size:10px;color:#3a3520;margin-top:4px;display:flex;gap:10px}

/* Select mode */
#select-bar{display:none;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1a10;border:1px solid #2a2515;border-radius:12px;padding:8px 16px;gap:10px;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:60}
#select-bar.open{display:flex}
#select-count{font-size:12px;color:#8a7a48;white-space:nowrap}
#select-bar button{padding:6px 14px;border-radius:8px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid #2a2515;background:none;color:#6b6040;transition:all .15s;white-space:nowrap}
#select-bar button:hover{border-color:#8a7a48;color:#d4c9a8}
#select-save-btn{background:#c5a356!important;color:#0a0b10!important;border-color:#c5a356!important}
#select-save-btn:hover{background:#e2c97e!important}
#select-cancel-btn:hover{color:#c25a4a;border-color:#c25a4a}
.select-mode .msg{cursor:pointer;border-radius:8px;padding:6px 8px;margin-left:-8px;margin-right:-8px;transition:background .1s,box-shadow .1s}
.select-mode .msg:hover{background:rgba(197,163,86,.05)}
.select-mode .msg.selected{background:rgba(197,163,86,.1);box-shadow:inset 3px 0 0 #c5a356}
.select-mode .msg::before{content:'';display:inline-block;width:18px;height:18px;border:2px solid #3a3520;border-radius:4px;vertical-align:middle;margin-right:8px;flex-shrink:0;transition:all .15s}
.select-mode .msg.selected::before{background:#c5a356;border-color:#c5a356;content:'✓';color:#0a0b10;font-size:12px;font-weight:700;text-align:center;line-height:18px}
.select-mode .msg-edit-btn,.select-mode .msg-actions{display:none!important}

/* Conversation section labels */
.conv-section-label{padding:8px 12px 4px;font-size:11px;color:#5a5540;font-weight:600;letter-spacing:.5px}

/* Conversation star */
.conv-star{opacity:0;background:none;border:none;color:#5a5540;cursor:pointer;padding:2px 4px;font-size:13px;transition:all .15s;flex-shrink:0}
.conv-item:hover .conv-star,.conv-star.starred{opacity:1}
.conv-star.starred{color:#c5a356}
.conv-star:hover{color:#e2c97e}

/* Conversation rename */
.conv-rename-input{background:#1e1a10;border:1px solid #8a7a48;border-radius:4px;color:#d4c9a8;font-size:12px;font-family:inherit;padding:2px 6px;width:100%;outline:none}

/* Conversation search */
#conv-search{width:calc(100% - 16px);margin:0 8px 6px;padding:6px 10px 6px 30px;border-radius:8px;background:#1e1a10;border:1px solid #2a2515;color:#d4c9a8;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
#conv-search:focus{border-color:#8a7a48}
#conv-search::placeholder{color:#5a5540}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#5a5540;pointer-events:none}

/* Memory indicator (L9) */
.memory-indicator{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#3a3520;margin-left:8px}
.memory-indicator .dot{width:5px;height:5px;border-radius:50%;background:#7aad5a}

/* LaTeX */
.katex-display{overflow-x:auto;padding:4px 0}

/* Typing cursor */
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.typing::after{content:'';display:inline-block;width:2px;height:1.1em;background:#c5a356;margin-left:2px;vertical-align:text-bottom;animation:blink 1s infinite}

/* File upload */
#file-preview{max-width:720px;margin:0 auto;padding:0 16px}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.file-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:#1e1a10;border:1px solid #2a2515;font-size:12px;color:#d4c9a8}
.file-chip img{width:32px;height:32px;object-fit:cover;border-radius:4px}
.file-chip .file-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .file-remove{background:none;border:none;color:#5a5540;cursor:pointer;font-size:14px;padding:0 2px;transition:color .15s}
.file-chip .file-remove:hover{color:#c25a4a}
#upload-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:1px solid #2a2515;background:transparent;color:#6b6040;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
#upload-btn:hover{border-color:#8a7a48;color:#d4c9a8}
#file-input{display:none}

/* Image in messages */
.msg-user .bubble img{max-width:200px;border-radius:8px;margin-top:8px;display:block}
.msg-content img{max-width:100%;border-radius:8px;margin:8px 0;border:1px solid #2a2515;cursor:pointer;transition:transform .2s}
.msg-content img:hover{transform:scale(1.02)}

/* Input area */
#input-area{border-top:1px solid #2a2515;padding:12px 16px}
#input-wrap{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:8px}
#input{flex:1;resize:none;border-radius:12px;padding:12px 16px;background:#1e1a10;border:1px solid #2a2515;color:#d4c9a8;font-size:14px;font-family:inherit;font-weight:500;line-height:1.6;outline:none;transition:border-color .15s,height .1s ease;min-height:44px;max-height:200px}
#input::placeholder{color:#5a5540}
#input:focus{border-color:#8a7a48}
#send-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:none;background:#c5a356;color:#0a0b10;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#send-btn:hover{background:#e2c97e}
#send-btn:disabled{background:#1e1a10;color:#5a5540;cursor:default}

/* Settings modal */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
#settings-overlay.open{display:flex}
#settings-modal{background:#0a0b10;border:1px solid #2a2515;border-radius:12px;width:420px;max-width:90vw;padding:24px}
#settings-modal h2{font-family:'Noto Serif SC',serif;color:#e2c97e;font-size:18px;margin-bottom:16px}
.setting-group{margin-bottom:16px}
.setting-group label{display:block;font-size:12px;color:#8a7a48;margin-bottom:6px;font-weight:700}
.setting-group input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;color:#d4c9a8;font-size:13px;font-family:inherit;font-weight:500;outline:none}
.setting-group input:focus{border-color:#8a7a48}
.setting-group input::placeholder{color:#5a5540}
.setting-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.setting-actions button{padding:8px 20px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid #2a2515;transition:all .15s}
#settings-save{background:#c5a356;color:#0a0b10;border-color:#c5a356}
#settings-save:hover{background:#e2c97e}
#settings-cancel{background:none;color:#6b6040}
#settings-cancel:hover{color:#d4c9a8}
#settings-btn,.topbar-btn{background:none;border:none;color:#6b6040;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#settings-btn:hover,.topbar-btn:hover{color:#d4c9a8;background:#1e1a10}

/* System prompt selector (custom dropdown) */
#prompt-wrap{position:relative}
#prompt-btn{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:#1e1a10;border:1px solid #2a2515;color:#6b6040;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
#prompt-btn:hover{border-color:#8a7a48;color:#d4c9a8}
#prompt-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;min-width:180px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;z-index:500;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#prompt-dropdown.open{display:block}
.prompt-option{display:block;width:100%;text-align:left;padding:8px 14px;font-size:12px;color:#d4c9a8;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:background .1s}
.prompt-option:hover{background:#241f14}
.prompt-option.selected{color:#e2c97e;background:#241f14}

/* Settings tabs */
.settings-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #2a2515}
.settings-tab{padding:8px 16px;font-size:13px;color:#6b6040;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.settings-tab:hover{color:#d4c9a8}
.settings-tab.active{color:#e2c97e;border-bottom-color:#c5a356}
.settings-pane{display:none}
.settings-pane.active{display:block}
.setting-group textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;color:#d4c9a8;font-size:13px;font-family:inherit;font-weight:500;outline:none;resize:vertical;min-height:80px}
.setting-group textarea:focus{border-color:#8a7a48}
.setting-group textarea::placeholder{color:#5a5540}
.preset-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preset-chip{padding:4px 10px;border-radius:4px;border:1px solid #2a2515;background:none;color:#6b6040;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.preset-chip:hover{border-color:#8a7a48;color:#c5a356}

/* PWA safe areas */
html{height:100%;height:-webkit-fill-available;overflow:hidden}
body{height:100%;height:-webkit-fill-available;overflow:hidden}
#input-area{padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px))}
#topbar{padding-top:calc(12px + env(safe-area-inset-top, 0px))}

/* Responsive */
@media(max-width:1024px){
  #sidebar{position:fixed;left:0;top:0;width:280px;height:100%;height:100dvh;z-index:200;background:#0a0b10;box-shadow:4px 0 24px rgba(0,0,0,.6)}
  #sidebar.hidden{transform:translateX(-100%);box-shadow:none}
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
  #sidebar-overlay.open{display:block}
  #msg-container,#input-wrap,#file-preview{padding-left:12px;padding-right:12px}
  #artifacts{position:fixed;right:0;top:0;height:100%;height:100dvh;z-index:80;width:100%;max-width:none;background:#0a0b10}
  #topbar{gap:8px;padding-left:12px;padding-right:12px}
  #model-btn{padding:4px 8px;font-size:12px}
  #prompt-btn{font-size:11px}
  #input{font-size:16px}
  .msg-user .bubble{max-width:85%}
  .msg-content{max-width:95%}
  #settings-modal{width:95vw;max-height:85vh;overflow-y:auto}
}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar overlay for mobile -->

  <!-- Sidebar -->

      <button class="sb-tab" data-panel="projects"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>Projects</button>
      <button class="sb-tab" data-panel="files"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V10c0-2-1-3-3-3h-4l-2-3H7c-2 0-3 1-3 3z"/></svg>Files</button>
      <button class="sb-tab" data-panel="memory"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Memory</button>
      <button class="sb-tab" data-panel="tools"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>Tools</button>
    </div>
    <!-- Chat panel -->
    <div class="sb-panel active" id="panel-chat">
      <button id="new-chat-btn">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Chat
      </button>
      <div class="search-wrap">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

      <div id="conv-list"></div>

    <!-- Tools panel -->
    <div class="sb-panel" id="panel-tools"></div>
    <div id="sidebar-footer">v0.2.1</div>
  </nav>

  <!-- Main -->
  <main id="main">
   <div id="main-area">
    <div id="chat-col">
    <!-- Top bar -->
    <header id="topbar">
      <button id="toggle-sidebar">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div id="model-select-wrap">
        <button id="model-btn">
          <span class="provider-tag">Claude</span>
          <span id="model-label">sonnet-4</span>
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="model-dropdown"></div>
      </div>
      <div id="prompt-wrap">
        <button id="prompt-btn">
          <span id="prompt-label">BIAV Analyst</span>
          <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="prompt-dropdown"></div>
      </div>
      <div style="flex:1"></div>

   </div><!-- /main-area -->

</div>

      <div class="setting-group">

        <input id="cfg-anthropic" type="password" placeholder="sk-ant-...">

        <label>OPENAI API KEY <span style="font-weight:400;color:#5a5540">（DALL-E AI 画图）</span></label>

      </div>
      <div class="setting-group" style="display:flex;align-items:center;gap:8px">

      </div>

// Live context fetched from deployed data files (with localStorage cache)
let liveContext = '';
const CONTEXT_CACHE_KEY = 'biav-context-cache';
const CONTEXT_CACHE_TTL = 30 * 60 * 1000; // 30 minutes

(async function loadLiveContext() {
  const files = [
    'data/BIAV-SC.md',
    'data/boot-snapshot.md',
    'data/daily-latest.md',
    'data/all-latest.json',
    'data/project-status.md',
    'data/strategic-assessment.md',
    'data/morimens-context.md',
    'data/strategic-plan-2026.md',
    'data/methodology.md',
    'data/decisions.md',
    'data/lessons-learned.md',
    'data/design-decisions.json',
    'data/interview-2026-04.json',
    'data/narrative-structure.json',
  ];

  // Try loading from cache first
  try {
    const cached = JSON.parse(localStorage.getItem(CONTEXT_CACHE_KEY) || 'null');
    if (cached && cached.version === APP_VERSION && (Date.now() - cached.ts) < CONTEXT_CACHE_TTL) {
      liveContext = cached.context;
      console.log('[BIAV] Context loaded from cache (' + cached.fileCount + ' files, ' + Math.round((Date.now() - cached.ts) / 1000) + 's ago)');
      // Background refresh if older than 5 minutes
      if ((Date.now() - cached.ts) > 5 * 60 * 1000) refreshContext(files);
      return;
    }
  } catch {}

  await refreshContext(files);
})();

async function refreshContext(files) {
  const parts = [];
  const loaded = [];
  for (const f of files) {
    try {
      const res = await fetch(f);
      if (res.ok) {
        const txt = await res.text();
        if (txt.trim()) { parts.push('## ' + f.replace('data/','') + '\n\n' + txt.trim()); loaded.push(f); }
      }
    } catch {}
  }
  if (parts.length) {
    liveContext = '\n\n---\n以下是银芯系统完整知识库（' + loaded.length + ' 个文件），请基于这些数据回答问题：\n\n' + parts.join('\n\n---\n\n');
    // Save to cache
    try {
      localStorage.setItem(CONTEXT_CACHE_KEY, JSON.stringify({
        context: liveContext, ts: Date.now(), fileCount: loaded.length, version: APP_VERSION
      }));
    } catch { /* localStorage full, ignore */ }
    console.log('[BIAV] Context refreshed:', loaded.length, '/', files.length, 'files');
  }
}

marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

const defaultRenderer = new marked.Renderer();
const customRenderer = new marked.Renderer();
customRenderer.code = function(token) {
  const lang = (token.lang || '').split(' ')[0] || '';
  let highlighted;
  if (lang && hljs.getLanguage(lang)) {
    highlighted = hljs.highlight(token.text, { language: lang }).value;
  } else {
    highlighted = hljs.highlightAuto(token.text).value;
  }
  const id = 'cb-' + Math.random().toString(36).slice(2, 8);
  return `<pre><div class="code-header"><span class="code-lang">${esc(lang || 'code')}</span><button class="copy-btn" onclick="copyCode('${id}')">Copy</button></div><code id="${id}" class="hljs">${highlighted}</code></pre>`;
};
marked.use({ renderer: customRenderer });

function renderMd(text) {
  // Process LaTeX before markdown: $$ block $$ and $ inline $
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
    try { return '<div class="katex-display">' + katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }) + '</div>'; }
    catch { return '$$' + tex + '$$'; }
  });
  text = text.replace(/(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
    catch { return '$' + tex + '$'; }
  });
  return marked.parse(text);
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.previousElementSibling?.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied') }, 1500) }
  });
}

let convSearchQuery = '';
function renderSidebar() {
  convList.innerHTML = '';
  const q = convSearchQuery.toLowerCase();
  const starred = S.conversations.filter(c => c.starred && (!q || c.title.toLowerCase().includes(q)));
  const recents = S.conversations.filter(c => !c.starred && (!q || c.title.toLowerCase().includes(q)));

  if (starred.length) {
    const label = document.createElement('div');
    label.className = 'conv-section-label';
    label.textContent = 'Starred';
    convList.appendChild(label);
    starred.forEach(c => convList.appendChild(makeConvItem(c)));
  }

  if (recents.length) {
    const label = document.createElement('div');
    label.className = 'conv-section-label';
    label.textContent = 'Recents';
    convList.appendChild(label);
    recents.forEach(c => convList.appendChild(makeConvItem(c)));
  }

  if (!starred.length && !recents.length && q) {
    convList.innerHTML = '<div style="padding:12px;text-align:center;color:#5a5540;font-size:12px">无匹配对话</div>';
  }
}

function makeConvItem(c) {
  const div = document.createElement('div');
  div.className = 'conv-item' + (c.id === S.convId ? ' active' : '');
  div.innerHTML = `<button class="conv-star${c.starred ? ' starred' : ''}" title="Star">★</button><span>${esc(c.title)}</span><button class="conv-del" title="Delete">&#x2715;</button>`;
  div.querySelector('span').onclick = () => loadConv(c.id);
  div.querySelector('span').ondblclick = (e) => { e.stopPropagation(); startRenameConv(c.id, div); };
  div.querySelector('.conv-star').onclick = (e) => { e.stopPropagation(); toggleStar(c.id); };
  div.querySelector('.conv-del').onclick = (e) => { e.stopPropagation(); deleteConv(c.id) };
  return div;
}

function toggleStar(id) {
  const c = S.conversations.find(x => x.id === id);
  if (c) { c.starred = !c.starred; saveConversations(); renderSidebar(); }
}

function startRenameConv(id, el) {
  const c = S.conversations.find(x => x.id === id);
  if (!c) return;
  const span = el.querySelector('span');
  const input = document.createElement('input');
  input.className = 'conv-rename-input';
  input.value = c.title;
  span.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    const val = input.value.trim();
    if (val) c.title = val;
    saveConversations();
    renderSidebar();
  };
  input.onblur = finish;
  input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); finish(); } if (e.key === 'Escape') renderSidebar(); };
}

  const container = document.createElement('div');

  conv.messages.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'msg msg-' + m.role;
    if (m.role === 'user') {
      let userHtml = esc(m.content);
      if (m._files) {
        m._files.filter(f => f.type.startsWith('image/')).forEach(f => {
          userHtml += `<img src="${f.dataUrl}" alt="${esc(f.name)}">`;
        });
      }
      div.innerHTML = `<button class="msg-edit-btn" data-idx="${i}" title="Edit">✏</button><div class="bubble">${userHtml}</div>`;
      div.querySelector('.msg-edit-btn').onclick = () => startEditMsg(i);
    } else {
      const isLast = i === conv.messages.length - 1;
      const isStreaming = isLast && S.streaming;
      const isLastAssistant = i === conv.messages.length - 1 && !S.streaming;
      let actionsHtml = '';
      if (!S.streaming) {
        actionsHtml = `<div class="msg-actions">
          <button class="msg-act-btn copy-msg-btn" data-idx="${i}" title="复制"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copy</button>`;
        if (isLastAssistant) {
          actionsHtml += `<button class="msg-act-btn retry-btn" title="重试"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Retry</button>`;
        }
        actionsHtml += '</div>';
      }
      let tokenHtml = '';
      if (m._usage && !S.streaming) {
        tokenHtml = `<div class="token-usage">↑${m._usage.input} ↓${m._usage.output} tokens</div>`;
      }
      div.innerHTML = `<div class="msg-content${isStreaming ? ' typing' : ''}">${renderMd(m.content)}</div>${actionsHtml}${tokenHtml}`;
    }
    container.appendChild(div);
  });
  messagesEl.innerHTML = '';
  messagesEl.appendChild(container);
  // Use instant scroll for full re-renders (history load), smooth for streaming
  if (S.streaming) {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  } else {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  setTimeout(() => {
    addArtifactButtons();
    bindMsgActions();
  }, 0);
}

function bindMsgActions() {
  document.querySelectorAll('.copy-msg-btn').forEach(btn => {
    btn.onclick = () => {
      const conv = currentConv();
      if (!conv) return;
      const idx = +btn.dataset.idx;
      const m = conv.messages[idx];
      if (!m) return;
      navigator.clipboard.writeText(m.content).then(() => {
        btn.innerHTML = btn.innerHTML.replace('Copy', 'Copied!');
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = btn.innerHTML.replace('Copied!', 'Copy'); btn.classList.remove('copied'); }, 1500);
      });
    };
  });
  document.querySelectorAll('.retry-btn').forEach(btn => {
    btn.onclick = () => {
      const conv = currentConv();
      if (!conv || S.streaming) return;
      // Find last user message
      let lastUserIdx = -1;
      for (let i = conv.messages.length - 1; i >= 0; i--) {
        if (conv.messages[i].role === 'user') { lastUserIdx = i; break; }
      }
      if (lastUserIdx < 0) return;
      const userText = conv.messages[lastUserIdx].content;
      // Truncate from last user message
      conv.messages = conv.messages.slice(0, lastUserIdx);
      conv.messages.push({ role: 'user', content: userText });
      conv.messages.push({ role: 'assistant', content: '' });
      S.streaming = true;
      _firstDeltaReceived = false;
      renderMessages();
      showThinkingDots();
      stopBtn.style.display = 'flex';
      sendBtn.style.display = 'none';
      const ctrl = new AbortController();
      S.abortCtrl = ctrl;
      streamClaude(conv, ctrl.signal).catch(err => {
        if (err.name !== 'AbortError') {
          const last = conv.messages[conv.messages.length - 1];
          if (last.role === 'assistant' && !last.content) { last.content = 'Error: ' + err.message; renderMessages(); }
        }
      }).finally(() => finishStream());
    };
  });
}

function startEditMsg(idx) {
  const conv = currentConv();
  if (!conv || S.streaming) return;
  const m = conv.messages[idx];
  if (m.role !== 'user') return;
  const msgEl = messagesEl.querySelectorAll('#msg-container .msg')[idx];
  if (!msgEl) return;
  const bubble = msgEl.querySelector('.bubble');
  const editBtn = msgEl.querySelector('.msg-edit-btn');
  if (editBtn) editBtn.style.display = 'none';
  bubble.outerHTML = `<div class="msg-edit-wrap"><textarea class="edit-ta">${esc(m.content)}</textarea><div class="msg-edit-actions"><button class="cancel" onclick="renderMessages()">Cancel</button><button class="save" data-idx="${idx}">Send</button></div></div>`;
  const wrap = msgEl.querySelector('.msg-edit-wrap');
  const ta = wrap.querySelector('.edit-ta');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  wrap.querySelector('.save').onclick = () => submitEditMsg(idx, ta.value.trim());
}

function submitEditMsg(idx, newText) {
  if (!newText || S.streaming) return;
  const conv = currentConv();
  if (!conv) return;
  // Truncate conversation from edit point (branch)
  conv.messages = conv.messages.slice(0, idx);
  conv.messages.push({ role: 'user', content: newText });
  conv.messages.push({ role: 'assistant', content: '' });
  S.streaming = true;
  _firstDeltaReceived = false;
  renderMessages();
  showThinkingDots();
  stopBtn.style.display = 'flex';
  sendBtn.style.display = 'none';
  const ctrl = new AbortController();
  S.abortCtrl = ctrl;
  streamClaude(conv, ctrl.signal).catch(err => {
    if (err.name !== 'AbortError') {
      const last = conv.messages[conv.messages.length - 1];
      if (last.role === 'assistant' && !last.content) { last.content = 'Error: ' + err.message; renderMessages(); }
    }
  }).finally(() => finishStream());
}

/* ===== Debounced streaming render ===== */
let _renderRAF = 0;
let _renderTimeout = 0;
const RENDER_DEBOUNCE_MS = 80;

/* ===== Smart scroll: only auto-scroll if user hasn't scrolled up ===== */
let userScrolledUp = false;
messagesEl.addEventListener('scroll', () => {
  const threshold = 60;
  userScrolledUp = (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) > threshold;
});

function smoothScrollToBottom() {
  if (userScrolledUp) return;
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

/* ===== Loading indicator (thinking dots) ===== */
let _thinkingDotsEl = null;
function showThinkingDots() {
  removeThinkingDots();
  const contentEl = messagesEl.querySelector('#msg-container .msg:last-child .msg-content');
  if (!contentEl) return;
  _thinkingDotsEl = document.createElement('div');
  _thinkingDotsEl.className = 'thinking-dots';
  _thinkingDotsEl.innerHTML = '<span></span><span></span><span></span>';
  contentEl.appendChild(_thinkingDotsEl);
  smoothScrollToBottom();
}
function removeThinkingDots() {
  if (_thinkingDotsEl) { _thinkingDotsEl.remove(); _thinkingDotsEl = null; }
}

let _firstDeltaReceived = false;

function appendDelta(text) {
  const conv = currentConv();
  if (!conv) return;
  const last = conv.messages[conv.messages.length - 1];
  if (last && last.role === 'assistant') {
    last.content += text;

    // Remove thinking dots on first real content
    if (!_firstDeltaReceived) {
      _firstDeltaReceived = true;
      removeThinkingDots();
    }

    // Debounced markdown re-render via rAF + timeout
    if (_renderRAF) cancelAnimationFrame(_renderRAF);
    clearTimeout(_renderTimeout);
    _renderTimeout = setTimeout(() => {
      _renderRAF = requestAnimationFrame(() => {
        const contentEl = messagesEl.querySelector('#msg-container .msg:last-child .msg-content');
        if (contentEl) {
          contentEl.innerHTML = renderMd(last.content);
          contentEl.classList.add('typing');
          smoothScrollToBottom();
        }
      });
    }, RENDER_DEBOUNCE_MS);
  }
}

function finishStream() {
  S.streaming = false;
  S.abortCtrl = null;
  _firstDeltaReceived = false;
  removeThinkingDots();
  // Cancel any pending debounced render and do a final full render
  if (_renderRAF) cancelAnimationFrame(_renderRAF);
  clearTimeout(_renderTimeout);
  const conv = currentConv();
  const contentEl = messagesEl.querySelector('#msg-container .msg:last-child .msg-content');
  if (contentEl) {
    const last = conv && conv.messages[conv.messages.length - 1];
    if (last && last.role === 'assistant') contentEl.innerHTML = renderMd(last.content);
    contentEl.classList.remove('typing');
  }
  stopBtn.style.display = 'none';
  sendBtn.style.display = 'flex';
  sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0);
  userScrolledUp = false;
  saveConversations();
  addArtifactButtons();
}

/* ===== LLM Streaming ===== */
async function sendMessage(text) {
  if (S.streaming) return;

  // Collect attached files
  const files = [...pendingFiles];
  pendingFiles.length = 0;
  renderFileChips();

  // Create conversation if needed
  if (!S.convId) {
    const conv = {
      id: crypto.randomUUID(),
      title: text.slice(0, 50),
      provider: S.provider,
      model: S.model,
      messages: [],
    };
    S.convId = conv.id;
    S.conversations.unshift(conv);
  }

  // Build display content (text + image indicators)
  let displayContent = text;
  const imageHtml = files.filter(f => f.type.startsWith('image/')).map(f => `\n![${f.name}](${f.dataUrl})`).join('');
  const textFiles = files.filter(f => !f.type.startsWith('image/'));
  const textFileContent = textFiles.map(f => `\n\n**[${f.name}]:**\n\`\`\`\n${atob(f.base64)}\n\`\`\``).join('');
  displayContent += textFileContent;

  const conv = currentConv();
  conv.messages.push({ role: 'user', content: displayContent, _files: files });
  conv.messages.push({ role: 'assistant', content: '' });
  conv.provider = S.provider;
  conv.model = S.model;
  S.streaming = true;
  _firstDeltaReceived = false;
  renderMessages();
  renderSidebar();
  showThinkingDots();

  stopBtn.style.display = 'flex';
  sendBtn.style.display = 'none';
  const ctrl = new AbortController();
  S.abortCtrl = ctrl;

  try {
    await streamClaude(conv, ctrl.signal);
  } catch (err) {
    if (err.name !== 'AbortError') {
      const last = conv.messages[conv.messages.length - 1];
      if (last.role === 'assistant' && !last.content) {
        last.content = 'Error: ' + err.message;
        renderMessages();
      }
    }
  }
  finishStream();
}

async function execTool(name, input) {
  try {
    if (name === 'read_file') {
      const res = await fetch(`${GITHUB_API}/contents/${encodeURIComponent(input.path).replace(/%2F/g, '/')}`, {
        headers: { 'Accept': 'application/vnd.github.v3.raw' }
      });
      if (!res.ok) return `Error: file not found (${res.status}) - ${input.path}`;
      const text = await res.text();
      // Truncate very large files
      if (text.length > 30000) return text.slice(0, 30000) + '\n\n... (truncated, file too large)';
      return text;
    }
    if (name === 'list_files') {
      const p = (input.path || '').replace(/\/+$/, '');
      const res = await fetch(`${GITHUB_API}/contents/${p}`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) return `Error: directory not found (${res.status})`;
      const items = await res.json();
      if (!Array.isArray(items)) return 'Error: path is a file, not a directory';
      return items.map(i => `${i.type === 'dir' ? '📁' : '📄'} ${i.name} ${i.size ? `(${i.size}B)` : ''}`).join('\n');
    }
    if (name === 'search_code') {
      const res = await fetch(`https://api.github.com/search/code?q=${encodeURIComponent(input.query)}+repo:${REPO_OWNER}/${REPO_NAME}`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) return `Error: search failed (${res.status})`;
      const data = await res.json();
      return data.items?.slice(0, 10).map(i => `${i.path} (score: ${i.score?.toFixed(1)})`).join('\n') || 'No results found';
    }
    if (name === 'generate_pdf') {
      // Lazy-load html2pdf.js
      if (!window.html2pdf) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const fname = (input.filename || 'document').replace(/\.pdf$/i, '');
      const html = renderMd(input.content);
      const container = document.createElement('div');
      container.innerHTML = html;
      container.style.cssText = 'font-family:"Noto Sans SC",sans-serif;color:#1a1a1a;font-size:13px;line-height:1.8;max-width:680px;padding:20px';
      container.querySelectorAll('h1,h2,h3').forEach(el => { el.style.color = '#8a6d20'; el.style.borderBottom = '1px solid #e8e0c8'; el.style.paddingBottom = '4px'; });
      container.querySelectorAll('code').forEach(el => { el.style.background = '#f5f0e0'; el.style.padding = '1px 4px'; el.style.borderRadius = '3px'; el.style.fontSize = '12px'; });
      container.querySelectorAll('pre').forEach(el => { el.style.background = '#f5f0e0'; el.style.padding = '10px'; el.style.borderRadius = '6px'; el.style.overflow = 'auto'; });
      container.querySelectorAll('pre code').forEach(el => { el.style.background = 'none'; el.style.padding = '0'; });
      container.querySelectorAll('table').forEach(el => { el.style.borderCollapse = 'collapse'; el.style.width = '100%'; el.style.fontSize = '12px'; });
      container.querySelectorAll('th,td').forEach(el => { el.style.border = '1px solid #d4c9a8'; el.style.padding = '5px 8px'; });
      container.querySelectorAll('th').forEach(el => { el.style.background = '#f5f0e0'; el.style.fontWeight = '700'; });
      container.querySelectorAll('blockquote').forEach(el => { el.style.borderLeft = '3px solid #c5a356'; el.style.paddingLeft = '12px'; el.style.color = '#666'; });
      document.body.appendChild(container);
      try {
        await html2pdf().set({
          margin: [15, 15, 15, 15],

        }).from(container).save();
        return `PDF generated and downloaded: ${fname}.pdf`;
      } finally { container.remove(); }
    }
    if (name === 'generate_docx') {
      const fname = (input.filename || 'document').replace(/\.docx?$/i, '');
      const html = renderMd(input.content);
      const docHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><style>
body{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;color:#1a1a1a;font-size:13px;line-height:1.8;max-width:680px;margin:0 auto;padding:24px}
h1,h2,h3{color:#8a6d20;border-bottom:1px solid #e8e0c8;padding-bottom:4px}
code{background:#f5f0e0;padding:1px 4px;border-radius:3px;font-size:12px;font-family:Consolas,monospace}
pre{background:#f5f0e0;padding:10px;border-radius:6px;overflow:auto}
pre code{background:none;padding:0}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{border:1px solid #d4c9a8;padding:5px 8px}
th{background:#f5f0e0;font-weight:700}
blockquote{border-left:3px solid #c5a356;padding-left:12px;color:#666;margin:8px 0}
</style></head><body>${html}</body></html>`;
      const blob = new Blob([docHtml], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname + '.doc';
      a.click();
      URL.revokeObjectURL(a.href);
      return `Word document generated and downloaded: ${fname}.doc`;
    }
    if (name === 'generate_excel') {
      // Lazy-load SheetJS
      if (!window.XLSX) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const fname = (input.filename || 'data').replace(/\.xlsx?$/i, '');
      const wb = XLSX.utils.book_new();
      for (const sheet of input.sheets) {
        const ws = XLSX.utils.json_to_sheet(sheet.data);
        // Auto-width columns
        const colWidths = {};
        [Object.keys(sheet.data[0] || {}), ...sheet.data.map(r => Object.values(r).map(String))].forEach(row => {
          row.forEach((v, i) => { colWidths[i] = Math.max(colWidths[i] || 8, Math.min(String(v).length + 2, 40)); });
        });
        ws['!cols'] = Object.values(colWidths).map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, ws, sheet.name || 'Sheet');
      }
      XLSX.writeFile(wb, fname + '.xlsx');
      const totalRows = input.sheets.reduce((s, sh) => s + sh.data.length, 0);
      return `Excel generated: ${fname}.xlsx (${input.sheets.length} sheet(s), ${totalRows} rows)`;
    }
    if (name === 'generate_pptx') {
      // Lazy-load PptxGenJS
      if (!window.PptxGenJS) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const fname = (input.filename || 'presentation').replace(/\.pptx?$/i, '');
      const pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_WIDE';
      // BIAV theme colors
      const gold = '#C5A356', darkBg = '#0A0B10', darkCard = '#1E1A10', lightText = '#D4C9A8';
      for (const s of input.slides) {
        const slide = pptx.addSlide();
        slide.background = { color: darkBg };
        if (s.layout === 'title') {
          slide.addText(s.title, { x: 0.5, y: 2.0, w: '90%', h: 1.5, fontSize: 36, fontFace: 'Microsoft YaHei', color: gold, bold: true, align: 'center' });
          if (s.content) slide.addText(s.content, { x: 0.5, y: 3.8, w: '90%', h: 1, fontSize: 18, color: lightText, align: 'center' });
          slide.addShape(pptx.ShapeType.line, { x: 3.5, y: 3.5, w: 6, h: 0, line: { color: gold, width: 1.5 } });
        } else if (s.layout === 'section') {
          slide.addText(s.title, { x: 0.5, y: 2.5, w: '90%', h: 1.2, fontSize: 32, fontFace: 'Microsoft YaHei', color: gold, bold: true, align: 'center' });
        } else {
          slide.addText(s.title, { x: 0.5, y: 0.3, w: '90%', h: 0.8, fontSize: 24, fontFace: 'Microsoft YaHei', color: gold, bold: true });
          slide.addShape(pptx.ShapeType.line, { x: 0.5, y: 1.05, w: 12, h: 0, line: { color: '2A2515', width: 1 } });
          if (s.content) {
            const bullets = s.content.split('\n').filter(l => l.trim());
            const textRows = bullets.map(b => {
              const isBullet = /^[-•*]\s/.test(b.trim());
              return { text: isBullet ? b.trim().replace(/^[-•*]\s+/, '') : b.trim(), options: { fontSize: 16, color: lightText, bullet: isBullet ? { code: '2022' } : false, paraSpaceAfter: 8 } };
            });
            slide.addText(textRows, { x: 0.5, y: 1.3, w: 12, h: 5.5, fontFace: 'Microsoft YaHei', valign: 'top' });
          }
        }
      }
      await pptx.writeFile({ fileName: fname + '.pptx' });
      return `PowerPoint generated: ${fname}.pptx (${input.slides.length} slides)`;
    }
    if (name === 'generate_image') {
      const fname = (input.filename || 'image').replace(/\.png$/i, '');
      const scale = input.scale || 2;
      return new Promise((resolve, reject) => {
        const svgStr = input.svg.trim();
        // Extract dimensions from SVG
        const wMatch = svgStr.match(/width="(\d+)/);
        const hMatch = svgStr.match(/height="(\d+)/);
        const vbMatch = svgStr.match(/viewBox="[^"]*\s(\d+)\s(\d+)"/);
        const w = parseInt(wMatch?.[1] || vbMatch?.[1] || '400');
        const h = parseInt(hMatch?.[1] || vbMatch?.[2] || '300');
        const canvas = document.createElement('canvas');
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        const img = new Image();
        const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        img.onload = () => {
          ctx.drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          canvas.toBlob(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fname + '.png';
            a.click();
            URL.revokeObjectURL(a.href);
            resolve(`Image generated: ${fname}.png (${w * scale}×${h * scale}px)`);
          }, 'image/png');
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve('Error: Failed to render SVG. Check SVG syntax.'); };
        img.src = url;
      });
    }
    if (name === 'generate_chart') {
      // Lazy-load Chart.js
      if (!window.Chart) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const fname = (input.filename || 'chart').replace(/\.png$/i, '');
      const w = input.width || 800, h = input.height || 500;
      const canvas = document.createElement('canvas');
      canvas.width = w * 2; canvas.height = h * 2;
      canvas.style.cssText = `width:${w}px;height:${h}px;position:fixed;left:-9999px`;
      document.body.appendChild(canvas);
      // BIAV dark theme defaults
      const biavColors = ['#C5A356','#7AAD5A','#5A9AC2','#C25A4A','#9B6DC2','#D4C9A8','#E2C97E','#5A5540'];
      const defaultOpts = {
        responsive: false,
        animation: false,
        plugins: {
          legend: { labels: { color: '#D4C9A8', font: { size: 14 } } },
          title: { color: '#E2C97E', font: { size: 18, weight: 'bold' } }
        },
        scales: (['pie','doughnut','polarArea','radar'].includes(input.type)) ? undefined : {
          x: { ticks: { color: '#D4C9A8' }, grid: { color: '#2A2515' } },
          y: { ticks: { color: '#D4C9A8' }, grid: { color: '#2A2515' } }
        }
      };
      // Apply default colors if not set
      if (input.data?.datasets) {
        input.data.datasets.forEach((ds, i) => {
          if (!ds.backgroundColor) {
            if (['pie','doughnut','polarArea'].includes(input.type)) ds.backgroundColor = biavColors;
            else ds.backgroundColor = biavColors[i % biavColors.length];
          }
          if (!ds.borderColor && ['line','radar'].includes(input.type)) ds.borderColor = biavColors[i % biavColors.length];
        });
      }
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      // Merge user options with defaults
      const mergedOpts = { ...defaultOpts, ...(input.options || {}) };
      const chart = new Chart(ctx, { type: input.type, data: input.data, options: mergedOpts });
      // Wait for render
      await new Promise(r => setTimeout(r, 100));
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          chart.destroy();
          canvas.remove();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = fname + '.png';
          a.click();
          URL.revokeObjectURL(a.href);
          resolve(`Chart generated: ${fname}.png (${w * 2}×${h * 2}px, type: ${input.type})`);
        }, 'image/png');
      });
    }
    if (name === 'generate_pixel_art') {
      const palette = input.palette || {};
      const grid = input.grid || [];
      const scale = Math.max(1, Math.min(32, input.scale || 8));
      const fname = (input.filename || 'pixel-art').replace(/\.png$/i, '');
      if (!grid.length) return 'Error: grid is empty';
      const cols = grid[0].length;
      const rows = grid.length;
      const canvas = document.createElement('canvas');
      canvas.width = cols * scale;
      canvas.height = rows * scale;
      const ctx = canvas.getContext('2d');
      // Background
      if (input.background && input.background !== 'transparent') {
        ctx.fillStyle = input.background;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      // Draw pixels
      for (let y = 0; y < rows; y++) {
        const row = grid[y];
        for (let x = 0; x < Math.min(row.length, cols); x++) {
          const ch = row[x];
          const color = palette[ch];
          if (!color || color === 'transparent' || color === '') continue;
          ctx.fillStyle = color;
          ctx.fillRect(x * scale, y * scale, scale, scale);
        }
      }
      // Export
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          const imgUrl = URL.createObjectURL(blob);
          // Download
          const a = document.createElement('a');
          a.href = imgUrl; a.download = fname + '.png'; a.click();
          // Display inline
          appendDelta(`\n\n![${fname}](${imgUrl})\n\n`);
          resolve(`Pixel art generated: ${fname}.png (${cols}×${rows} pixels, scale ${scale}x, actual ${cols * scale}×${rows * scale}px)`);
        }, 'image/png');
      });
    }
    if (name === 'generate_html') {
      const fname = (input.filename || 'page').replace(/\.html?$/i, '');
      const title = input.title || 'HTML Artifact';
      // Download
      const blob = new Blob([input.html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname + '.html';
      a.click();
      URL.revokeObjectURL(a.href);
      // Open in Artifacts panel for preview
      openArtifact(input.html, 'html');
      $('#art-title').textContent = title;
      showArtView('preview');
      return `HTML file generated: ${fname}.html (${input.html.length} bytes). Preview opened in Artifacts panel.`;
    }
    if (name === 'generate_midi') {
      // Lazy-load midi-writer-js
      if (!window.MidiWriter) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/build/MidiWriter.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const fname = (input.filename || 'music').replace(/\.mid$/i, '');
      const tracks = [];
      for (const t of input.tracks) {
        const track = new MidiWriter.Track();
        if (t.name) track.addTrackName(t.name);
        if (input.tempo) track.setTempo(input.tempo);
        // Set instrument (program change)
        const ch = (t.channel || 1) - 1; // 0-indexed internally
        if (t.instrument !== undefined) {
          track.addEvent(new MidiWriter.ProgramChangeEvent({ instrument: t.instrument, channel: ch + 1 }));
        }
        // Add notes
        for (const n of (t.notes || [])) {
          if (n.pitch === 'rest') {
            // Rest: use a note with 0 velocity, or just wait
            track.addEvent(new MidiWriter.NoteEvent({
              pitch: ['C4'], duration: n.duration || '4', velocity: 0, channel: ch + 1
            }));
          } else {
            const pitchArr = Array.isArray(n.pitch) ? n.pitch : [n.pitch];
            const evt = {
              pitch: pitchArr,
              duration: n.duration || '4',
              velocity: n.velocity || 80,
              channel: ch + 1
            };
            if (n.wait) evt.wait = n.wait;
            track.addEvent(new MidiWriter.NoteEvent(evt));
          }
        }
        tracks.push(track);
      }
      const writer = new MidiWriter.Writer(tracks);
      const blob = new Blob([writer.buildFile()], { type: 'audio/midi' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname + '.mid';
      a.click();
      URL.revokeObjectURL(a.href);
      const totalNotes = input.tracks.reduce((s, t) => s + (t.notes?.length || 0), 0);
      return `MIDI generated: ${fname}.mid (${input.tracks.length} track(s), ${totalNotes} notes, ${input.tempo || 120} BPM)`;
    }
    if (name === 'ai_image') {
      const cfg = loadConfig();
      const key = cfg.openai;
      if (!key) {
        openSettings();
        const el = $('#cfg-openai');
        el.value = '';
        el.placeholder = '请输入 OpenAI API Key 以使用 AI 画图';
        el.focus();
        return 'Error: OpenAI API Key not configured. Please set it in Settings (gear icon).';
      }
      const fname = (input.filename || 'ai-image').replace(/\.png$/i, '');
      appendDelta('\n\n> 🎨 正在生成 AI 图片...\n\n');
      const res = await fetch('https://api.openai.com/v1/images/generations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({
          model: 'dall-e-3',
          prompt: input.prompt,
          n: 1,
          size: input.size || '1024x1024',
          style: input.style || 'vivid',
          quality: input.quality || 'standard',
          response_format: 'b64_json'
        })
      });
      if (!res.ok) {
        const err = await res.text();
        if (res.status === 401) {
          openSettings();
          $('#cfg-openai').focus();
          return 'Error: OpenAI API Key invalid. Please update in Settings.';
        }
        return `Error: DALL-E API ${res.status}: ${err}`;
      }
      const data = await res.json();
      const b64 = data.data[0].b64_json;
      const revisedPrompt = data.data[0].revised_prompt || '';
      // Convert base64 to blob and download
      const binary = atob(b64);
      const arr = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
      const blob = new Blob([arr], { type: 'image/png' });
      const imgUrl = URL.createObjectURL(blob);
      // Download
      const a = document.createElement('a');
      a.href = imgUrl; a.download = fname + '.png'; a.click();
      // Display inline in chat
      appendDelta(`\n\n![${fname}](${imgUrl})\n\n`);
      return `Image generated and downloaded: ${fname}.png (${input.size || '1024x1024'})` + (revisedPrompt ? `\nRevised prompt: ${revisedPrompt}` : '');
    }
    if (name === 'run_javascript') {
      return new Promise((resolve) => {
        const iframe = document.createElement('iframe');
        iframe.sandbox = 'allow-scripts';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const logs = [];
        const timer = setTimeout(() => {
          window.removeEventListener('message', handler);
          iframe.remove();
          resolve(logs.join('\n') + '\n[Timeout: exceeded 10s]');
        }, 10000);
        function handler(e) {
          if (e.source !== iframe.contentWindow) return;
          if (e.data?.t === 'log') logs.push(e.data.v);
          if (e.data?.t === 'done' || e.data?.t === 'err') {
            clearTimeout(timer);
            window.removeEventListener('message', handler);
            iframe.remove();
            if (e.data.t === 'err') logs.push('Error: ' + e.data.v);
            resolve(logs.join('\n') || '(no output)');
          }
        }
        window.addEventListener('message', handler);
        const code = input.code;
        iframe.srcdoc = '<script>' +
          'console.log=console.warn=console.error=(...a)=>{' +
            'parent.postMessage({t:"log",v:a.map(x=>typeof x==="object"?JSON.stringify(x,null,2):String(x)).join(" ")},"*")' +
          '};' +
          'try{' +
            'const r=(0,eval)('+JSON.stringify(code)+');' +
            'if(r!==undefined)console.log(r);' +
            'parent.postMessage({t:"done"},"*")' +
          '}catch(e){' +
            'parent.postMessage({t:"err",v:e.message},"*")' +
          '}' +
        '<\/script>';
      });
    }
    return 'Unknown tool';
  } catch (e) {
    return `Error: ${e.message}`;
  }
}

/* -- Claude API (direct from browser, with tool use) -- */
async function streamClaude(conv, signal) {
  const cfg = loadConfig();
  const key = cfg.anthropic;
  if (!key) throw new Error('Anthropic API Key not configured. Click the gear icon to set it.');

  const sysPrompt = getSystemPrompt();

  function buildMsgs() {
    return conv.messages.slice(0, -1).filter(m => m.role !== 'system').map(m => {
      if (m._toolMessages) return null; // skip marker
      if (m._files && m._files.length > 0) {
        const content = [];
        m._files.filter(f => f.type.startsWith('image/')).forEach(f => {
          content.push({ type: 'image', source: { type: 'base64', media_type: f.type, data: f.base64 } });
        });
        content.push({ type: 'text', text: m.content });
        return { role: m.role, content };
      }
      return { role: m.role, content: m.content };
    }).filter(Boolean);
  }

  // Extended thinking — disabled by default, toggle via settings
  const cfg2 = loadConfig();
  const useThinking = cfg2.enableThinking && !S.model.includes('haiku');

  // Build tools array: user-defined tools + server tools
  const allTools = [
    { type: 'web_search_20250305', name: 'web_search' },
    ...TOOLS
  ];

  // API messages for tool use loop (separate from display messages)
  let apiMessages = buildMsgs();
  const MAX_TOOL_ROUNDS = 8;

  for (let round = 0; round <= MAX_TOOL_ROUNDS; round++) {
    const body = {
      model: S.model,
      max_tokens: useThinking ? 16000 : 8192,
      stream: true,
      ...(sysPrompt ? { system: sysPrompt } : {}),
      tools: allTools,
      ...(useThinking ? { thinking: { type: 'enabled', budget_tokens: 8000 } } : {}),
      messages: apiMessages,
    };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(body),
      signal,
    });

    if (!res.ok) {
      const err = await res.text();
      if (res.status === 401) {
        // Clear invalid key from config
        const c = loadConfig(); delete c.anthropic; saveConfig(c);
        openSettings();
        const input = $('#cfg-anthropic');
        input.value = '';
        input.placeholder = '密钥无效，请输入有效的 API Key';
        input.focus();
        throw new Error('API 密钥无效或已过期，请在设置中更新密钥');
      }
      throw new Error(`Claude API ${res.status}: ${err}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let toolCalls = [];
    let currentToolId = null;
    let currentToolName = null;
    let currentToolInput = '';
    let stopReason = null;
    let usageData = null;
    let thinkingText = '';
    let inThinking = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const j = JSON.parse(data);
          if (j.type === 'content_block_start') {
            if (j.content_block?.type === 'thinking') {
              inThinking = true;
              thinkingText = '';
            } else if (j.content_block?.type === 'web_search_tool_result') {
              // Server-side search results — show indicator
              appendDelta('\n\n> 🔍 搜索完成\n\n');
            } else if (j.content_block?.type === 'tool_use') {
              if (j.content_block.name === 'web_search') {
                // Server tool — show indicator, don't track for client execution
                appendDelta('\n\n> 🔍 正在搜索网页...\n\n');
              } else {
                currentToolId = j.content_block.id;
                currentToolName = j.content_block.name;
                currentToolInput = '';
              }
            }
          } else if (j.type === 'content_block_delta') {
            if (j.delta?.type === 'thinking_delta' && j.delta.thinking) {
              thinkingText += j.delta.thinking;
            } else if (j.delta?.type === 'text_delta' && j.delta.text) {
              appendDelta(j.delta.text);
            } else if (j.delta?.type === 'input_json_delta' && j.delta.partial_json) {
              currentToolInput += j.delta.partial_json;
            }
          } else if (j.type === 'content_block_stop') {
            if (inThinking && thinkingText) {
              // Insert thinking block as collapsible before text
              const thinkId = 'think-' + Math.random().toString(36).slice(2, 8);
              appendDelta(`<div class="thinking-block"><button class="thinking-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5l8 7-8 7z"/></svg>Thinking...</button><div class="thinking-content">${esc(thinkingText)}</div></div>\n\n`);
              inThinking = false;
              thinkingText = '';
            }
            if (currentToolId) {
              let input = {};
              try { input = JSON.parse(currentToolInput); } catch {}
              toolCalls.push({ id: currentToolId, name: currentToolName, input });
              currentToolId = null;
              currentToolName = null;
              currentToolInput = '';
            }
          } else if (j.type === 'message_start' && j.message?.usage) {
            usageData = { input: j.message.usage.input_tokens || 0, output: 0 };
          } else if (j.type === 'message_delta') {
            if (j.delta?.stop_reason) stopReason = j.delta.stop_reason;
            if (j.usage?.output_tokens) { if (usageData) usageData.output = j.usage.output_tokens; }
          }
        } catch {}
      }
    }

    // Save usage data to the assistant message
    if (usageData) {
      const last = conv.messages[conv.messages.length - 1];
      if (last && last.role === 'assistant') {
        last._usage = last._usage ? { input: last._usage.input + usageData.input, output: last._usage.output + usageData.output } : { ...usageData };
      }
    }

    // If no tool calls, we're done
    if (stopReason !== 'tool_use' || toolCalls.length === 0) break;

    // Show tool use indicator
    const toolNames = toolCalls.map(t => t.name === 'read_file' ? t.input.path : t.name === 'list_files' ? `ls ${t.input.path||'/'}` : t.input.query);
    appendDelta(`\n\n> 🔧 ${toolNames.join(', ')}\n\n`);

    // Build assistant message with tool_use blocks
    const assistantContent = [];
    // Include any text that was streamed
    const currentText = conv.messages[conv.messages.length - 1].content;
    const textBeforeTools = currentText.split('\n\n> 🔧')[0].trim();
    if (textBeforeTools) assistantContent.push({ type: 'text', text: textBeforeTools });
    for (const tc of toolCalls) {
      assistantContent.push({ type: 'tool_use', id: tc.id, name: tc.name, input: tc.input });
    }

    // Execute tools and collect results
    const toolResults = [];
    for (const tc of toolCalls) {
      const result = await execToolWithMemory(tc.name, tc.input);
      toolResults.push({ type: 'tool_result', tool_use_id: tc.id, content: result });
    }

    // Append to API messages for next round
    apiMessages.push({ role: 'assistant', content: assistantContent });
    apiMessages.push({ role: 'user', content: toolResults });
  }
}
