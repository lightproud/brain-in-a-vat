/* ===== Export ===== */
function exportConversation() {
  const conv = currentConv();
  if (!conv || conv.messages.length === 0) return;
  let md = `# ${conv.title}\n\n`;
  md += `> Model: ${conv.provider} / ${conv.model}\n`;
  md += `> Date: ${new Date(conv.messages[0].createdAt || Date.now()).toLocaleString()}\n\n---\n\n`;
  conv.messages.forEach(m => {
    if (m.role === 'user') md += `## User\n\n${m.content}\n\n`;
    else md += `## Assistant\n\n${m.content}\n\n`;
  });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${conv.title.slice(0, 30).replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_')}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ===== Select Mode (save as image) ===== */
let selectMode = false;
const selectedMsgs = new Set();

function enterSelectMode() {
  const conv = currentConv();
  if (!conv || conv.messages.length === 0 || S.streaming) return;
  selectMode = true;
  selectedMsgs.clear();
  const container = messagesEl.querySelector('#msg-container');
  if (container) container.classList.add('select-mode');
  $('#select-bar').classList.add('open');
  updateSelectCount();
  // Bind click on messages
  document.querySelectorAll('#msg-container .msg').forEach((el, i) => {
    el._selectIdx = i;
    el.onclick = (e) => {
      if (!selectMode) return;
      e.stopPropagation();
      if (selectedMsgs.has(i)) { selectedMsgs.delete(i); el.classList.remove('selected'); }
      else { selectedMsgs.add(i); el.classList.add('selected'); }
      updateSelectCount();
    };
  });
}

function exitSelectMode() {
  selectMode = false;
  selectedMsgs.clear();
  const container = messagesEl.querySelector('#msg-container');
  if (container) {
    container.classList.remove('select-mode');
    container.querySelectorAll('.msg.selected').forEach(el => el.classList.remove('selected'));
  }
  $('#select-bar').classList.remove('open');
}

function selectAllMsgs() {
  const conv = currentConv();
  if (!conv) return;
  const all = document.querySelectorAll('#msg-container .msg');
  all.forEach((el, i) => { selectedMsgs.add(i); el.classList.add('selected'); });
  updateSelectCount();
}

function updateSelectCount() {
  $('#select-count').textContent = `已选 ${selectedMsgs.size} 条`;
  $('#select-save-btn').disabled = selectedMsgs.size === 0;
}

async function saveSelectedAsImage() {
  if (selectedMsgs.size === 0) return;
  const conv = currentConv();
  if (!conv) return;

  // Lazy-load html2canvas
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // Build a styled container with selected messages
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:720px;padding:24px 20px;background:#0a0b10;font-family:"Noto Sans SC",sans-serif;color:#d4c9a8;font-size:14px;line-height:1.8';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #2a2515';
  header.innerHTML = `<span style="font-family:\'Noto Serif SC\',serif;color:#e2c97e;font-size:16px;font-weight:700;letter-spacing:2px">缸中之脑</span><span style="color:#3a3520;font-size:11px">${conv.title.slice(0, 40)}</span>`;
  wrap.appendChild(header);

  // Messages
  const sorted = [...selectedMsgs].sort((a, b) => a - b);
  sorted.forEach(idx => {
    const m = conv.messages[idx];
    if (!m) return;
    const div = document.createElement('div');
    div.style.cssText = 'margin-bottom:14px';
    if (m.role === 'user') {
      div.style.cssText += ';display:flex;justify-content:flex-end';
      const bubble = document.createElement('div');
      bubble.style.cssText = 'max-width:75%;padding:10px 14px;border-radius:14px 14px 4px 14px;background:#1e1a10;border:1px solid #2a2515;font-size:14px;line-height:1.8;white-space:pre-wrap';
      bubble.textContent = m.content;
      div.appendChild(bubble);
    } else {
      const content = document.createElement('div');
      content.style.cssText = 'max-width:85%;font-size:14px;line-height:1.8';
      content.innerHTML = renderMd(m.content);
      // Style inline elements for image
      content.querySelectorAll('h1,h2,h3').forEach(el => { el.style.color = '#e2c97e'; el.style.fontWeight = '700'; });
      content.querySelectorAll('strong').forEach(el => el.style.color = '#e2c97e');
      content.querySelectorAll('code').forEach(el => { el.style.background = '#1e1a10'; el.style.color = '#e2c97e'; el.style.padding = '2px 6px'; el.style.borderRadius = '3px'; el.style.fontSize = '.9em'; });
      content.querySelectorAll('pre').forEach(el => { el.style.background = '#1e1a10'; el.style.border = '1px solid #2a2515'; el.style.borderRadius = '6px'; el.style.padding = '12px'; el.style.overflow = 'hidden'; });
      content.querySelectorAll('pre code').forEach(el => { el.style.background = 'none'; el.style.padding = '0'; el.style.display = 'block'; });
      content.querySelectorAll('blockquote').forEach(el => { el.style.borderLeft = '3px solid #c5a356'; el.style.paddingLeft = '1em'; el.style.color = '#8a7a48'; });
      content.querySelectorAll('a').forEach(el => el.style.color = '#c5a356');
      div.appendChild(content);
    }
    wrap.appendChild(div);
  });

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:12px;padding-top:10px;border-top:1px solid #2a2515;display:flex;justify-content:space-between;font-size:10px;color:#3a3520';
  footer.innerHTML = `<span>BIAV-SC · ${S.model}</span><span>${new Date().toLocaleDateString('zh-CN')}</span>`;
  wrap.appendChild(footer);

  document.body.appendChild(wrap);

  try {
    const canvas = await html2canvas(wrap, {
      backgroundColor: '#0a0b10',
      scale: 2,
      useCORS: true,
      logging: false,
    });
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `biav-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  } finally {
    wrap.remove();
  }
  exitSelectMode();
}

const artPanel = { code: '', lang: '', open: false };
const PREVIEWABLE = ['html', 'svg', 'mermaid'];

function openArtifact(code, lang) {
  artPanel.code = code;
  artPanel.lang = lang;
  artPanel.open = true;
  $('#artifacts').classList.add('open');
  $('#art-title').textContent = lang ? `${lang.toUpperCase()} artifact` : 'Artifact';

  // Code view

  if (lang && hljs.getLanguage(lang)) {
    highlighted = hljs.highlight(code, { language: lang }).value;
  } else {
    highlighted = hljs.highlightAuto(code).value;
  }
  $('#art-code-view').innerHTML = highlighted;

  if (PREVIEWABLE.includes(lang)) {
    $('#art-tab-preview').style.display = '';
    updatePreview(code, lang);
  } else {
    $('#art-tab-preview').style.display = 'none';
    showArtView('code');
  }

function updatePreview(code, lang) {
  const iframe = $('#art-iframe');
  if (lang === 'svg') {
    iframe.srcdoc = `<!DOCTYPE html><html><body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5">${code}</body></html>`;
  } else if (lang === 'html') {
    iframe.srcdoc = code;
  } else if (lang === 'mermaid') {
    iframe.srcdoc = `<!DOCTYPE html><html><head><script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"><\/script></head><body style="margin:20px;background:#f5f5f5"><pre class="mermaid">${code.replace(/</g,'&lt;')}</pre><script>mermaid.initialize({startOnLoad:true,theme:'neutral'});<\/script></body></html>`;
  }
}

function showArtView(view) {
  $('#art-tab-code').classList.toggle('active', view === 'code');
  $('#art-tab-preview').classList.toggle('active', view === 'preview');
  $('#art-code-view').style.display = view === 'code' ? '' : 'none';
  $('#art-preview-view').style.display = view === 'preview' ? '' : 'none';
}

function closeArtifact() {
  artPanel.open = false;
  $('#artifacts').classList.remove('open');
}

// Add "Open in Artifact" buttons to code blocks after render
function addArtifactButtons() {
  document.querySelectorAll('.msg-content pre').forEach(pre => {
    if (pre.querySelector('.art-open-btn')) return;
    const header = pre.querySelector('.code-header');
    if (!header) return;
    const langEl = header.querySelector('.code-lang');
    const lang = (langEl?.textContent || '').toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'copy-btn art-open-btn';

/* ===== File Upload ===== */
const pendingFiles = []; // [{name, type, base64, dataUrl}]

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  for (const file of files) {
    const dataUrl = await fileToBase64(file);
    const base64 = dataUrl.split(',')[1];
    pendingFiles.push({ name: file.name, type: file.type, base64, dataUrl });
  }
  renderFileChips();
}

function renderFileChips() {
  const container = $('#file-chips');
  container.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    if (f.type.startsWith('image/')) {
      chip.innerHTML = `<img src="${f.dataUrl}"><span class="file-name">${esc(f.name)}</span><button class="file-remove" onclick="removeFile(${i})">&times;</button>`;
    } else {
      chip.innerHTML = `<span class="file-name">${esc(f.name)}</span><button class="file-remove" onclick="removeFile(${i})">&times;</button>`;
    }
    container.appendChild(chip);
  });
  sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0) || S.streaming;
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFileChips();
}

/* ===== Cross-session Memory (L9) ===== */
const MEMORY_KEY = 'biav-memory';
function loadMemory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); } catch { return []; }
}
function saveMemory(mem) { localStorage.setItem(MEMORY_KEY, JSON.stringify(mem)); }
function addMemory(text) {
  const mem = loadMemory();
  mem.push({ text, ts: Date.now() });
  if (mem.length > 50) mem.shift(); // keep max 50 entries
  saveMemory(mem);
}
function getMemoryPrompt() {
  const mem = loadMemory();
  if (!mem.length) return '';
  return '\n\n---\n用户跨会话记忆（请参考但不要主动提及）：\n' + mem.map(m => '- ' + m.text).join('\n');
}

// Extend execTool
const _origExecTool = execTool;
async function execToolWithMemory(name, input) {
  if (name === 'save_memory') {
    addMemory(input.content);
    return `Memory saved: "${input.content}"`;
  }
  return _origExecTool(name, input);
}

/* -- Files Panel -- */
let currentFilePath = '';
async function renderFiles(path) {
  const panel = $('#panel-files');
  panel.innerHTML = '<div class="ft-path">/' + esc(path || '') + '</div><div class="file-tree" id="file-tree"><div style="padding:12px;color:#5a5540;font-size:12px">Loading...</div></div>';
  try {
    const p = path.replace(/\/+$/, '');
    const res = await fetch(`${GITHUB_API}/contents/${p}`, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error(res.status);
    const items = await res.json();
    const tree = $('#file-tree');
    tree.innerHTML = '';
    if (path) {
      const back = document.createElement('div');
      back.className = 'ft-item ft-back';
      back.textContent = '.. back';
      back.onclick = () => renderFiles(path.split('/').slice(0, -1).join('/'));
      tree.appendChild(back);
    }
    const sorted = (Array.isArray(items) ? items : []).sort((a, b) => (a.type === 'dir' ? 0 : 1) - (b.type === 'dir' ? 0 : 1) || a.name.localeCompare(b.name));
    sorted.forEach(item => {
      const div = document.createElement('div');
      div.className = 'ft-item' + (item.type === 'dir' ? ' dir' : '');
      div.innerHTML = (item.type === 'dir' ? '📁 ' : '📄 ') + esc(item.name) + (item.size ? ` <span style="color:#3a3520;font-size:10px">${item.size > 1024 ? Math.round(item.size/1024)+'K' : item.size+'B'}</span>` : '');
      div.onclick = () => {
        if (item.type === 'dir') { renderFiles((path ? path + '/' : '') + item.name); }
        else {
          // Insert file path into chat input
          inputEl.value += (inputEl.value ? ' ' : '') + '请读取文件 ' + item.path;
          inputEl.focus();
          adjustInput();
          if (isMobile()) { sidebar.classList.add('hidden'); sidebarOverlay.classList.remove('open'); }
        }
      };
      tree.appendChild(div);
    });
  } catch (e) {
    $('#file-tree').innerHTML = '<div style="padding:12px;color:#c25a4a;font-size:12px">Error: ' + esc(e.message) + '</div>';
  }
}

/* -- Memory Panel -- */
function renderMemoryPanel() {
  const panel = $('#panel-memory');
  const mem = loadMemory();
  panel.innerHTML = '';
  // Actions bar
  const actions = document.createElement('div');
  actions.className = 'mem-actions';
  actions.innerHTML = '<button onclick="addMemoryManual()">+ Add</button><button class="danger" onclick="clearAllMemory()">Clear All</button>';
  panel.appendChild(actions);
  if (!mem.length) {
    panel.innerHTML += '<div class="mem-empty">No memories saved yet.<br><span style="font-size:11px;color:#3a3520">AI will save important info automatically,<br>or click + Add to save manually.</span></div>';
    return;
  }
  const list = document.createElement('div');
  list.style.cssText = 'flex:1;overflow-y:auto;padding:4px 0';
  mem.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'mem-item';
    const date = new Date(m.ts);
    div.innerHTML = `<div class="mem-text">${esc(m.text)}</div><span class="mem-time">${date.getMonth()+1}/${date.getDate()}</span><button class="mem-del" onclick="deleteMemoryItem(${i})" title="Delete">&times;</button>`;
    list.appendChild(div);
  });
  panel.appendChild(list);
}

function addMemoryManual() {
  const text = prompt('Enter memory to save:');
  if (text && text.trim()) { addMemory(text.trim()); renderMemoryPanel(); }
}

function deleteMemoryItem(idx) {
  const mem = loadMemory();
  mem.splice(idx, 1);
  saveMemory(mem);
  renderMemoryPanel();
}

function clearAllMemory() {
  if (confirm('Clear all memories? This cannot be undone.')) {
    saveMemory([]);
    renderMemoryPanel();
  }
}

function updateGreetingUser() {
  const user = currentUser();
  const h = new Date().getHours();
  const icon = $('#greeting-icon');
  const text = $('#greeting-text');
  let timeText;
  if (h >= 5 && h < 8) { icon.textContent = '🌅'; timeText = '早安'; }
  else if (h >= 8 && h < 12) { icon.textContent = '☀️'; timeText = '上午好'; }
  else if (h >= 12 && h < 14) { icon.textContent = '🌤'; timeText = '午安'; }
  else if (h >= 14 && h < 18) { icon.textContent = '⛅'; timeText = '下午好'; }
  else if (h >= 18 && h < 22) { icon.textContent = '🌙'; timeText = '晚上好'; }
  else { icon.textContent = '✦'; timeText = '夜深了'; }
  text.textContent = user ? `${timeText}，${user}` : timeText;
}

// Register Service Worker with auto-update on new version
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).then(reg => {
    // Check for updates immediately, then every 5 minutes
    reg.update().catch(() => {});
    setInterval(() => reg.update().catch(() => {}), 5 * 60 * 1000);
    // When a new SW is found, auto-reload to apply
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
          // New SW activated — reload to get fresh content
          if (!S.streaming) location.reload();
        }
      });
    });
  }).catch(() => {});
  // Also reload if controller changes (e.g. skipWaiting from new SW)
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    if (!S.streaming) location.reload();
  });
}
