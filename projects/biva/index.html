<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BIVA / Brain in a Vat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BIVA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b10">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark-dimmed.min.css">
<style>
/* ===== Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0b10;color:#d4c9a8;font-family:'Noto Sans SC',sans-serif;font-weight:500}
::selection{background:rgba(197,163,86,.3);color:#e2c97e}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0b10}
::-webkit-scrollbar-thumb{background:#2a2515;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3520}

/* ===== Layout ===== */
#app{display:flex;height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden}
#main-area{display:flex;flex:1;min-width:0}
#chat-col{display:flex;flex-direction:column;flex:1;min-width:0}

/* Artifacts panel */
#artifacts{display:none;width:45%;max-width:560px;border-left:1px solid #2a2515;flex-direction:column;background:#0a0b10}
#artifacts.open{display:flex}
#artifacts-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #2a2515;gap:8px}
#artifacts-header .art-title{flex:1;font-size:13px;color:#e2c97e;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-tab{padding:4px 10px;border-radius:4px;border:1px solid #2a2515;background:none;color:#6b6040;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.art-tab:hover{border-color:#8a7a48;color:#d4c9a8}
.art-tab.active{background:#1e1a10;color:#e2c97e;border-color:#8a7a48}
#art-close{background:none;border:none;color:#5a5540;cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
#art-close:hover{color:#d4c9a8}
#art-code-view{flex:1;overflow:auto;padding:12px;font-size:13px;line-height:1.6;font-family:Menlo,Consolas,monospace;background:#1e1a10;color:#d4c9a8;white-space:pre-wrap}
#art-preview-view{flex:1;overflow:auto;background:#fff;border:none}
#art-preview-view iframe{width:100%;height:100%;border:none}
.art-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid #2a2515}
.art-footer .copy-btn{font-size:12px;padding:4px 12px}

/* Sidebar */
#sidebar{width:260px;display:flex;flex-direction:column;border-right:1px solid #2a2515;flex-shrink:0;transition:transform .25s ease;position:relative;z-index:90}
#sidebar.hidden{transform:translateX(-100%);position:absolute;height:100%}
#sidebar-header{padding:16px;border-bottom:1px solid #2a2515}
#sidebar-header h1{font-family:'Noto Serif SC',serif;color:#e2c97e;font-size:18px;font-weight:700;letter-spacing:2px}
#sidebar-header p{color:#5a5540;font-size:12px;margin-top:2px}
#new-chat-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 24px);margin:12px;padding:10px 12px;border-radius:8px;border:1px solid #2a2515;background:transparent;color:#6b6040;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
#new-chat-btn:hover{border-color:#8a7a48;color:#c5a356}
#conv-list{flex:1;overflow-y:auto;padding:4px 8px}
.conv-item{display:flex;align-items:center;padding:10px 12px;margin-bottom:2px;border-radius:8px;cursor:pointer;font-size:14px;color:#6b6040;transition:all .15s}
.conv-item:hover{background:#1e1a10;color:#d4c9a8}
.conv-item.active{background:#1e1a10;border:1px solid #2a2515;color:#e2c97e}
.conv-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-del{opacity:0;background:none;border:none;color:#5a5540;cursor:pointer;padding:4px;font-size:12px;transition:opacity .15s}
.conv-item:hover .conv-del{opacity:1}
.conv-del:hover{color:#c25a4a}
#sidebar-footer{padding:12px;border-top:1px solid #2a2515;text-align:center;color:#5a5540;font-size:11px}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Top bar */
#topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #2a2515;flex-shrink:0;overflow:hidden}
#toggle-sidebar{background:none;border:none;color:#6b6040;cursor:pointer;padding:4px;transition:color .15s}
#toggle-sidebar:hover{color:#d4c9a8}
#model-select-wrap{position:relative}
#model-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:#1e1a10;border:1px solid #2a2515;color:#6b6040;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0}
#model-btn:hover{border-color:#8a7a48;color:#d4c9a8}
#model-btn .provider-tag{color:#c5a356;font-size:11px;font-weight:700}
#model-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;width:300px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;z-index:50;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#model-dropdown.open{display:block}
.provider-group-label{padding:8px 12px;font-size:11px;font-weight:700;color:#8a7a48;border-bottom:1px solid #2a2515;display:flex;align-items:center;gap:6px}
.provider-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.provider-dot.on{background:#7aad5a}
.provider-dot.off{background:#c25a4a}
.model-option{display:block;width:100%;text-align:left;padding:8px 16px;font-size:13px;color:#d4c9a8;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:background .1s}
.model-option:hover{background:#241f14}
.model-option.selected{color:#e2c97e;background:#241f14}
#stop-btn{display:none;flex-shrink:0;width:40px;height:40px;border-radius:12px;border:none;background:#c25a4a;color:#fff;cursor:pointer;align-items:center;justify-content:center;transition:background .15s}
#stop-btn:hover{background:#d96a5a}

/* Messages area */
#messages{flex:1;overflow-y:auto}
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px}
#empty-state h2{font-family:'Noto Serif SC',serif;font-size:28px;color:#e2c97e;font-weight:700;margin-bottom:4px}
#empty-state .subtitle{color:#6b6040;font-size:13px}
#empty-state .deco-line{width:64px;height:1px;background:#c5a356;opacity:.4;margin:24px 0}
#empty-state .intro{max-width:460px;color:#5a5540;font-size:12.5px;line-height:1.8;text-align:left}
#empty-state .intro strong{color:#8a7a48;font-weight:700}
#empty-state .intro .tag{display:inline-block;background:#1e1a10;color:#6b6040;font-size:11px;padding:1px 6px;border-radius:3px;margin:0 1px;font-family:Menlo,Consolas,monospace}
#empty-state .ver{color:#3a3520;font-size:11px;margin-top:20px;letter-spacing:1px}
#msg-container{max-width:720px;margin:0 auto;padding:24px 16px}

/* Message bubbles */
.msg{margin-bottom:16px}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{max-width:75%;padding:12px 16px;border-radius:16px 16px 4px 16px;background:#1e1a10;border:1px solid #2a2515;font-size:14px;line-height:1.8;white-space:pre-wrap}
.msg-assistant{display:flex;gap:12px}
.msg-avatar{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e1a10;border:1px solid #8a7a48;display:flex;align-items:center;justify-content:center;margin-top:4px}
.msg-avatar span{color:#c5a356;font-size:12px;font-family:'Noto Serif SC',serif;font-weight:700}
.msg-content{min-width:0;max-width:85%;font-size:14px;line-height:1.8}

/* Markdown in assistant messages */
.msg-content h1,.msg-content h2,.msg-content h3{font-family:'Noto Serif SC',serif;color:#e2c97e;font-weight:700;margin:1em 0 .5em}
.msg-content h1{font-size:1.4em}.msg-content h2{font-size:1.2em}.msg-content h3{font-size:1.05em}
.msg-content p{margin:.5em 0}
.msg-content ul,.msg-content ol{padding-left:1.5em;margin:.4em 0}
.msg-content li{margin:.2em 0;line-height:1.7}
.msg-content li::marker{color:#c5a356}
.msg-content code{background:#1e1a10;color:#e2c97e;padding:2px 6px;border-radius:3px;font-size:.9em;font-family:Menlo,Consolas,monospace}
.msg-content pre{background:#1e1a10;border:1px solid #2a2515;border-radius:6px;overflow-x:auto;margin:.8em 0;position:relative}
.msg-content pre code{background:none;padding:12px;display:block;font-size:.85em;line-height:1.6}
.msg-content pre code.hljs{background:#1e1a10!important}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#161210;border-bottom:1px solid #2a2515;font-size:11px;color:#8a7a48}
.code-lang{font-weight:700;text-transform:uppercase}
.copy-btn{background:none;border:1px solid #2a2515;color:#6b6040;font-size:11px;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all .15s}
.copy-btn:hover{border-color:#8a7a48;color:#d4c9a8}
.copy-btn.copied{color:#7aad5a;border-color:#7aad5a}
.msg-content blockquote{border-left:3px solid #c5a356;padding-left:1em;color:#8a7a48;margin:.8em 0}
.msg-content table{width:100%;border-collapse:collapse;margin:.8em 0;font-size:.9em}
.msg-content th{background:#1e1a10;color:#e2c97e;font-weight:700;padding:6px 10px;border:1px solid #2a2515;text-align:left}
.msg-content td{padding:6px 10px;border:1px solid #2a2515}
.msg-content tr:nth-child(even) td{background:rgba(197,163,86,.04)}
.msg-content a{color:#c5a356;text-decoration:none}
.msg-content a:hover{color:#e2c97e;text-decoration:underline}
.msg-content strong{color:#e2c97e;font-weight:700}
.msg-content hr{border:none;border-top:1px solid #2a2515;margin:1em 0}

/* Typing cursor */
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.typing::after{content:'';display:inline-block;width:2px;height:1.1em;background:#c5a356;margin-left:2px;vertical-align:text-bottom;animation:blink 1s infinite}

/* File upload */
#file-preview{max-width:720px;margin:0 auto;padding:0 16px}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.file-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:#1e1a10;border:1px solid #2a2515;font-size:12px;color:#d4c9a8}
.file-chip img{width:32px;height:32px;object-fit:cover;border-radius:4px}
.file-chip .file-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .file-remove{background:none;border:none;color:#5a5540;cursor:pointer;font-size:14px;padding:0 2px;transition:color .15s}
.file-chip .file-remove:hover{color:#c25a4a}
#upload-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:1px solid #2a2515;background:transparent;color:#6b6040;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
#upload-btn:hover{border-color:#8a7a48;color:#d4c9a8}
#file-input{display:none}

/* Image in messages */
.msg-user .bubble img{max-width:200px;border-radius:8px;margin-top:8px;display:block}

/* Input area */
#input-area{border-top:1px solid #2a2515;padding:12px 16px}
#input-wrap{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:8px}
#input{flex:1;resize:none;border-radius:12px;padding:12px 16px;background:#1e1a10;border:1px solid #2a2515;color:#d4c9a8;font-size:14px;font-family:inherit;font-weight:500;line-height:1.6;outline:none;transition:border-color .15s;min-height:44px;max-height:200px}
#input::placeholder{color:#5a5540}
#input:focus{border-color:#8a7a48}
#send-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:none;background:#c5a356;color:#0a0b10;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#send-btn:hover{background:#e2c97e}
#send-btn:disabled{background:#1e1a10;color:#5a5540;cursor:default}

/* Settings modal */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
#settings-overlay.open{display:flex}
#settings-modal{background:#0a0b10;border:1px solid #2a2515;border-radius:12px;width:420px;max-width:90vw;padding:24px}
#settings-modal h2{font-family:'Noto Serif SC',serif;color:#e2c97e;font-size:18px;margin-bottom:16px}
.setting-group{margin-bottom:16px}
.setting-group label{display:block;font-size:12px;color:#8a7a48;margin-bottom:6px;font-weight:700}
.setting-group input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;color:#d4c9a8;font-size:13px;font-family:inherit;font-weight:500;outline:none}
.setting-group input:focus{border-color:#8a7a48}
.setting-group input::placeholder{color:#5a5540}
.setting-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.setting-actions button{padding:8px 20px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid #2a2515;transition:all .15s}
#settings-save{background:#c5a356;color:#0a0b10;border-color:#c5a356}
#settings-save:hover{background:#e2c97e}
#settings-cancel{background:none;color:#6b6040}
#settings-cancel:hover{color:#d4c9a8}
#settings-btn{background:none;border:none;color:#6b6040;cursor:pointer;padding:4px;transition:color .15s;font-size:16px}
#settings-btn:hover{color:#d4c9a8}
.topbar-btn{background:none;border:none;color:#6b6040;cursor:pointer;padding:4px;transition:color .15s}
.topbar-btn:hover{color:#d4c9a8}

/* System prompt selector */
#prompt-select{padding:4px 8px;border-radius:6px;background:#1e1a10;border:1px solid #2a2515;color:#6b6040;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;outline:none;max-width:140px}
#prompt-select:hover{border-color:#8a7a48;color:#d4c9a8}
#prompt-select option{background:#1e1a10;color:#d4c9a8}

/* Settings tabs */
.settings-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #2a2515}
.settings-tab{padding:8px 16px;font-size:13px;color:#6b6040;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.settings-tab:hover{color:#d4c9a8}
.settings-tab.active{color:#e2c97e;border-bottom-color:#c5a356}
.settings-pane{display:none}
.settings-pane.active{display:block}
.setting-group textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2a2515;background:#1e1a10;color:#d4c9a8;font-size:13px;font-family:inherit;font-weight:500;outline:none;resize:vertical;min-height:80px}
.setting-group textarea:focus{border-color:#8a7a48}
.setting-group textarea::placeholder{color:#5a5540}
.preset-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preset-chip{padding:4px 10px;border-radius:4px;border:1px solid #2a2515;background:none;color:#6b6040;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.preset-chip:hover{border-color:#8a7a48;color:#c5a356}

/* PWA safe areas */
html{height:100%;height:-webkit-fill-available;overflow:hidden}
body{height:100%;height:-webkit-fill-available;overflow:hidden}
#input-area{padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px))}
#topbar{padding-top:calc(12px + env(safe-area-inset-top, 0px))}

/* Responsive */
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;height:100%;height:100dvh;z-index:90;background:#0a0b10}
  #sidebar.hidden{transform:translateX(-100%)}
  #msg-container,#input-wrap,#file-preview{padding-left:12px;padding-right:12px}
  #artifacts{position:fixed;right:0;top:0;height:100%;height:100dvh;z-index:80;width:100%;max-width:none;background:#0a0b10}
  #topbar{gap:8px;padding-left:12px;padding-right:12px}
  #model-btn{padding:4px 8px;font-size:12px}
  #prompt-select{max-width:100px;font-size:11px}
  #input{font-size:16px}
  .msg-user .bubble{max-width:85%}
  .msg-content{max-width:95%}
  #settings-modal{width:95vw;max-height:85vh;overflow-y:auto}
}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <h1>BIVA</h1>
      <p>B.I.A.V. Studio</p>
    </div>
    <button id="new-chat-btn">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Chat
    </button>
    <div id="conv-list"></div>
    <div id="sidebar-footer">v0.2.1</div>
  </nav>

  <!-- Main -->
  <main id="main">
   <div id="main-area">
    <div id="chat-col">
    <!-- Top bar -->
    <header id="topbar">
      <button id="toggle-sidebar">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div id="model-select-wrap">
        <button id="model-btn">
          <span class="provider-tag">Claude</span>
          <span id="model-label">sonnet-4</span>
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="model-dropdown"></div>
      </div>
      <select id="prompt-select" title="System Prompt">
        <option value="biav" selected>BIAV Analyst</option>
        <option value="assistant">General Assistant</option>
        <option value="coder">Coding Expert</option>
        <option value="writer">Creative Writer</option>
        <option value="translator">Translator</option>
        <option value="">No prompt</option>
        <option value="custom">Custom...</option>
      </select>
      <div style="flex:1"></div>
      <button class="topbar-btn" id="export-btn" title="Export conversation">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </button>
      <button id="settings-btn" title="Settings">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <div id="messages">
      <div id="empty-state">
        <h2>碧瓦</h2>
        <p class="subtitle">BIAV-SC 银芯系统 · AI 增强终端</p>
        <div class="deco-line"></div>
        <div class="intro">
          <strong>银芯（BIAV-SC）</strong>是 B.I.A.V. Studio 为「忘却前夜 Morimens」构建的 AI 增强系统。<br><br>
          已接入 <span class="tag">9 模块记忆系统</span> <span class="tag">做梦三层架构</span> <span class="tag">知识图谱</span>，覆盖 63 角色事实圣经、每日社区情报循环、Wiki 权威站点等核心能力。<br><br>
          默认以 <strong>BIAV Analyst</strong> 身份应答，具备完整项目上下文。可切换顶栏预设使用通用助手、编程专家等模式。
        </div>
        <span class="ver">v0.2.1</span>
      </div>
    </div>

    <!-- Input -->

/* ===== System Prompts ===== */

  '': '',
  biav: `你是 BIAV-SC（银芯）系统的 AI 分析师，服务于 B.I.A.V. Studio 的忘却前夜（Morimens）项目。

身份：缸中之脑·银芯系统核心 AI，代号 BIVA。

  assistant: 'You are a helpful assistant. Answer concisely and accurately.',

/* ===== Markdown + Syntax Highlighting ===== */
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

const defaultRenderer = new marked.Renderer();
const customRenderer = new marked.Renderer();
customRenderer.code = function(token) {
  const lang = (token.lang || '').split(' ')[0] || '';
  let highlighted;
  if (lang && hljs.getLanguage(lang)) {
    highlighted = hljs.highlight(token.text, { language: lang }).value;
  } else {
    highlighted = hljs.highlightAuto(token.text).value;
  }
  const id = 'cb-' + Math.random().toString(36).slice(2, 8);
  return `<pre><div class="code-header"><span class="code-lang">${esc(lang || 'code')}</span><button class="copy-btn" onclick="copyCode('${id}')">Copy</button></div><code id="${id}" class="hljs">${highlighted}</code></pre>`;
};
marked.use({ renderer: customRenderer });

function renderMd(text) { return marked.parse(text) }

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.previousElementSibling?.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied') }, 1500) }
  });
}

/* ===== Sidebar ===== */
function renderSidebar() {
  convList.innerHTML = '';
  S.conversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === S.convId ? ' active' : '');
    div.innerHTML = `<span>${esc(c.title)}</span><button class="conv-del" title="Delete">&#x2715;</button>`;
    div.querySelector('span').onclick = () => loadConv(c.id);
    div.querySelector('.conv-del').onclick = (e) => { e.stopPropagation(); deleteConv(c.id) };
    convList.appendChild(div);
  });
}

function newChat() {
  S.convId = null;
  renderMessages();
  renderSidebar();
}

function loadConv(id) {
  S.convId = id;
  const c = S.conversations.find(x => x.id === id);
  if (c) { S.provider = c.provider; S.model = c.model; updateModelBtn() }
  renderMessages();
  renderSidebar();
  if (isMobile()) sidebar.classList.add('hidden');
}

function deleteConv(id) {
  S.conversations = S.conversations.filter(c => c.id !== id);
  saveConversations();
  if (S.convId === id) S.convId = null;
  renderMessages();
  renderSidebar();
}

function currentConv() { return S.conversations.find(c => c.id === S.convId) }

/* ===== Messages ===== */
function renderMessages() {
  const conv = currentConv();
  if (!conv || conv.messages.length === 0) {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
    return;
  }
  emptyState.style.display = 'none';
  const container = document.createElement('div');
  container.id = 'msg-container';
  conv.messages.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'msg msg-' + m.role;
    if (m.role === 'user') {
      let userHtml = esc(m.content);
      if (m._files) {
        m._files.filter(f => f.type.startsWith('image/')).forEach(f => {
          userHtml += `<img src="${f.dataUrl}" alt="${esc(f.name)}">`;
        });
      }
      div.innerHTML = `<div class="bubble">${userHtml}</div>`;
    } else {
      const isLast = i === conv.messages.length - 1 && S.streaming;
      div.innerHTML = `
        <div class="msg-avatar"><span>B</span></div>
        <div class="msg-content${isLast ? ' typing' : ''}">${renderMd(m.content)}</div>`;
    }
    container.appendChild(div);
  });
  messagesEl.innerHTML = '';
  messagesEl.appendChild(container);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  setTimeout(addArtifactButtons, 0);
}

function appendDelta(text) {
  const conv = currentConv();
  if (!conv) return;
  const last = conv.messages[conv.messages.length - 1];
  if (last && last.role === 'assistant') {
    last.content += text;
    // Incremental render for performance
    const contentEl = messagesEl.querySelector('#msg-container .msg:last-child .msg-content');
    if (contentEl) {
      contentEl.innerHTML = renderMd(last.content);
      contentEl.classList.add('typing');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }
}

function finishStream() {
  S.streaming = false;
  S.abortCtrl = null;
  stopBtn.style.display = 'none';
  sendBtn.style.display = 'flex';
  sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0);
  const contentEl = messagesEl.querySelector('#msg-container .msg:last-child .msg-content');
  if (contentEl) contentEl.classList.remove('typing');
  saveConversations();
  addArtifactButtons();
}

/* ===== LLM Streaming ===== */
async function sendMessage(text) {
  if (S.streaming) return;

  // Collect attached files
  const files = [...pendingFiles];
  pendingFiles.length = 0;
  renderFileChips();

  // Create conversation if needed
  if (!S.convId) {
    const conv = {
      id: crypto.randomUUID(),
      title: text.slice(0, 50),
      provider: S.provider,
      model: S.model,
      messages: [],
    };
    S.convId = conv.id;
    S.conversations.unshift(conv);
  }

  // Build display content (text + image indicators)
  let displayContent = text;
  const imageHtml = files.filter(f => f.type.startsWith('image/')).map(f => `\n![${f.name}](${f.dataUrl})`).join('');
  const textFiles = files.filter(f => !f.type.startsWith('image/'));
  const textFileContent = textFiles.map(f => `\n\n**[${f.name}]:**\n\`\`\`\n${atob(f.base64)}\n\`\`\``).join('');
  displayContent += textFileContent;

  const conv = currentConv();
  conv.messages.push({ role: 'user', content: displayContent, _files: files });
  conv.messages.push({ role: 'assistant', content: '' });
  conv.provider = S.provider;
  conv.model = S.model;
  S.streaming = true;
  renderMessages();
  renderSidebar();

  stopBtn.style.display = 'flex';
  sendBtn.style.display = 'none';
  const ctrl = new AbortController();
  S.abortCtrl = ctrl;

  try {
    if (S.provider === 'claude') {
      await streamClaude(conv, ctrl.signal);
    } else if (S.provider === 'openai') {
      await streamOpenAI(conv, ctrl.signal);
    } else if (S.provider === 'ollama') {
      await streamOllama(conv, ctrl.signal);
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      const last = conv.messages[conv.messages.length - 1];
      if (last.role === 'assistant' && !last.content) {
        last.content = 'Error: ' + err.message;
        renderMessages();
      }
    }
  }
  finishStream();
}

/* -- Claude API (direct from browser) -- */
async function streamClaude(conv, signal) {
  const cfg = loadConfig();
  const key = cfg.anthropic;
  if (!key) throw new Error('Anthropic API Key not configured. Click the gear icon to set it.');

  const sysPrompt = getSystemPrompt();
  const msgs = conv.messages.slice(0, -1).filter(m => m.role !== 'system').map(m => {
    // Build multimodal content if files are attached
    if (m._files && m._files.length > 0) {
      const content = [];
      // Add images
      m._files.filter(f => f.type.startsWith('image/')).forEach(f => {
        content.push({ type: 'image', source: { type: 'base64', media_type: f.type, data: f.base64 } });
      });
      // Add text (including text file contents)
      content.push({ type: 'text', text: m.content });
      return { role: m.role, content };
    }
    return { role: m.role, content: m.content };
  });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: S.model,
      max_tokens: 8192,
      stream: true,
      ...(sysPrompt ? { system: sysPrompt } : {}),
      messages: msgs,
    }),
    signal,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Claude API ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') return;
      try {
        const j = JSON.parse(data);
        if (j.type === 'content_block_delta' && j.delta?.text) {
          appendDelta(j.delta.text);
        }
      } catch {}
    }
  }
}

/* -- OpenAI API -- */
async function streamOpenAI(conv, signal) {
  const cfg = loadConfig();
  const key = cfg.openai;
  if (!key) throw new Error('OpenAI API Key not configured. Click the gear icon to set it.');
  const base = cfg.openaiBase || 'https://api.openai.com/v1';

  const sysP = getSystemPrompt();
  const msgs = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
  if (sysP) msgs.unshift({ role: 'system', content: sysP });

  const res = await fetch(`${base}/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({ model: S.model, messages: msgs, stream: true }),
    signal,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`OpenAI API ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') return;
      try {
        const j = JSON.parse(data);
        const delta = j.choices?.[0]?.delta?.content;
        if (delta) appendDelta(delta);
      } catch {}
    }
  }
}

/* -- Ollama API -- */
async function streamOllama(conv, signal) {
  const cfg = loadConfig();
  const base = cfg.ollama || 'http://localhost:11434';
  const sysO = getSystemPrompt();
  const msgs = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
  if (sysO) msgs.unshift({ role: 'system', content: sysO });

  const res = await fetch(`${base}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: S.model, messages: msgs, stream: true }),
    signal,
  });

  if (!res.ok) throw new Error(`Ollama ${res.status}: ${res.statusText}`);

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.trim()) continue;
      try {
        const j = JSON.parse(line);
        if (j.message?.content) appendDelta(j.message.content);
      } catch {}
    }
  }
}

/* ===== Export ===== */
function exportConversation() {
  const conv = currentConv();
  if (!conv || conv.messages.length === 0) return;
  let md = `# ${conv.title}\n\n`;
  md += `> Model: ${conv.provider} / ${conv.model}\n`;
  md += `> Date: ${new Date(conv.messages[0].createdAt || Date.now()).toLocaleString()}\n\n---\n\n`;
  conv.messages.forEach(m => {
    if (m.role === 'user') md += `## User\n\n${m.content}\n\n`;
    else md += `## Assistant\n\n${m.content}\n\n`;
  });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${conv.title.slice(0, 30).replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_')}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ===== Artifacts ===== */
const artPanel = { code: '', lang: '', open: false };
const PREVIEWABLE = ['html', 'svg', 'mermaid'];

function openArtifact(code, lang) {
  artPanel.code = code;
  artPanel.lang = lang;
  artPanel.open = true;
  $('#artifacts').classList.add('open');
  $('#art-title').textContent = lang ? `${lang.toUpperCase()} artifact` : 'Artifact';
  $('#art-lang').textContent = lang || '';

  // Code view
  let highlighted;
  if (lang && hljs.getLanguage(lang)) {
    highlighted = hljs.highlight(code, { language: lang }).value;
  } else {
    highlighted = hljs.highlightAuto(code).value;
  }
  $('#art-code-view').innerHTML = highlighted;

  // Preview
  if (PREVIEWABLE.includes(lang)) {
    $('#art-tab-preview').style.display = '';
    updatePreview(code, lang);
  } else {
    $('#art-tab-preview').style.display = 'none';
    showArtView('code');
  }
}

function updatePreview(code, lang) {
  const iframe = $('#art-iframe');
  if (lang === 'svg') {
    iframe.srcdoc = `<!DOCTYPE html><html><body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5">${code}</body></html>`;
  } else if (lang === 'html') {
    iframe.srcdoc = code;
  } else if (lang === 'mermaid') {
    iframe.srcdoc = `<!DOCTYPE html><html><head><script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"><\/script></head><body style="margin:20px;background:#f5f5f5"><pre class="mermaid">${code.replace(/</g,'&lt;')}</pre><script>mermaid.initialize({startOnLoad:true,theme:'neutral'});<\/script></body></html>`;
  }
}

function showArtView(view) {
  $('#art-tab-code').classList.toggle('active', view === 'code');
  $('#art-tab-preview').classList.toggle('active', view === 'preview');
  $('#art-code-view').style.display = view === 'code' ? '' : 'none';
  $('#art-preview-view').style.display = view === 'preview' ? '' : 'none';
}

function closeArtifact() {
  artPanel.open = false;
  $('#artifacts').classList.remove('open');
}

// Add "Open in Artifact" buttons to code blocks after render
function addArtifactButtons() {
  document.querySelectorAll('.msg-content pre').forEach(pre => {
    if (pre.querySelector('.art-open-btn')) return;
    const header = pre.querySelector('.code-header');
    if (!header) return;
    const langEl = header.querySelector('.code-lang');
    const lang = (langEl?.textContent || '').toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'copy-btn art-open-btn';
    btn.textContent = PREVIEWABLE.includes(lang) ? 'Preview' : 'Expand';
    btn.onclick = () => {
      const codeEl = pre.querySelector('code');
      if (codeEl) openArtifact(codeEl.textContent, lang);
      if (PREVIEWABLE.includes(lang)) showArtView('preview');
    };
    header.insertBefore(btn, header.querySelector('.copy-btn'));
  });
}

/* ===== File Upload ===== */
const pendingFiles = []; // [{name, type, base64, dataUrl}]

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  for (const file of files) {
    const dataUrl = await fileToBase64(file);
    const base64 = dataUrl.split(',')[1];
    pendingFiles.push({ name: file.name, type: file.type, base64, dataUrl });
  }
  renderFileChips();
}

function renderFileChips() {
  const container = $('#file-chips');
  container.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    if (f.type.startsWith('image/')) {
      chip.innerHTML = `<img src="${f.dataUrl}"><span class="file-name">${esc(f.name)}</span><button class="file-remove" onclick="removeFile(${i})">&times;</button>`;
    } else {
      chip.innerHTML = `<span class="file-name">${esc(f.name)}</span><button class="file-remove" onclick="removeFile(${i})">&times;</button>`;
    }
    container.appendChild(chip);
  });
  sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0) || S.streaming;
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFileChips();
}

/* ===== Input auto-resize ===== */
function adjustInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0) || S.streaming;
}

/* ===== Escape HTML ===== */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

/* ===== Event Listeners ===== */
$('#toggle-sidebar').onclick = () => sidebar.classList.toggle('hidden');
// Auto-hide sidebar on mobile when selecting conversation
const isMobile = () => window.innerWidth <= 768;
$('#new-chat-btn').onclick = newChat;
modelBtn.onclick = () => { buildModelDropdown(); modelDropdown.classList.toggle('open') };
document.addEventListener('mousedown', e => {
  if (!$('#model-select-wrap').contains(e.target)) modelDropdown.classList.remove('open');
});
$('#settings-btn').onclick = openSettings;
$('#settings-cancel').onclick = closeSettings;
$('#settings-save').onclick = saveSettings;
$('#export-btn').onclick = exportConversation;
settingsOverlay.addEventListener('mousedown', e => { if (e.target === settingsOverlay) closeSettings() });

// Settings tabs
document.querySelectorAll('.settings-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.settings-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-' + tab.dataset.tab).classList.add('active');
  };
});

// Preset chips
document.querySelectorAll('.preset-chip').forEach(chip => {
  chip.onclick = () => { $('#cfg-custom-prompt').value = chip.dataset.p; };
});

// Prompt selector - open custom in settings
$('#prompt-select').onchange = function() {
  if (this.value === 'custom') openSettings();
};

inputEl.addEventListener('input', adjustInput);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (text && !S.streaming) {
      inputEl.value = '';
      adjustInput();
      sendMessage(text);
    }
  }
});

sendBtn.onclick = () => {
  const text = inputEl.value.trim();
  if (text && !S.streaming) {
    inputEl.value = '';
    adjustInput();
    sendMessage(text);
  }
};

stopBtn.onclick = () => { if (S.abortCtrl) S.abortCtrl.abort() };

// Artifacts
$('#art-close').onclick = closeArtifact;
$('#art-tab-code').onclick = () => showArtView('code');
$('#art-tab-preview').onclick = () => showArtView('preview');
$('#art-copy').onclick = () => {
  navigator.clipboard.writeText(artPanel.code).then(() => {
    const btn = $('#art-copy');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy code'; btn.classList.remove('copied') }, 1500);
  });
};

// File upload
$('#upload-btn').onclick = () => $('#file-input').click();
$('#file-input').onchange = (e) => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ''; };

// Drag and drop
const inputArea = $('#input-area');
inputArea.addEventListener('dragover', e => { e.preventDefault(); inputArea.style.borderColor = '#c5a356' });
inputArea.addEventListener('dragleave', () => { inputArea.style.borderColor = '' });
inputArea.addEventListener('drop', e => { e.preventDefault(); inputArea.style.borderColor = ''; if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files) });

// Paste images
inputEl.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  const imageFiles = [];
  for (const item of items) {
    if (item.type.startsWith('image/')) { const f = item.getAsFile(); if (f) imageFiles.push(f) }
  }
  if (imageFiles.length) handleFiles(imageFiles);
});

/* ===== Init ===== */
loadConversations();
renderSidebar();
renderMessages();
updateModelBtn();
if (isMobile()) sidebar.classList.add('hidden');

// Register Service Worker for offline caching
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

</script>
</body>
</html>
