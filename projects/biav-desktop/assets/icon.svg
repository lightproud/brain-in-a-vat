<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#1a1810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2c97e"/>
      <stop offset="100%" stop-color="#c5a356"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#2a2515" stroke-width="2"/>
  <!-- Brain circuit pattern -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Central node -->
    <circle cx="256" cy="240" r="24" fill="#c5a356" fill-opacity="0.15"/>
    <circle cx="256" cy="240" r="8" fill="#c5a356"/>
    <!-- Left branches -->
    <path d="M232 240 L180 200 L140 200"/>
    <path d="M180 200 L160 160"/>
    <path d="M232 240 L180 280 L140 280"/>
    <path d="M180 280 L160 320"/>
    <circle cx="140" cy="200" r="6" fill="#c5a356"/>
    <circle cx="160" cy="160" r="5" fill="#c5a356"/>
    <circle cx="140" cy="280" r="6" fill="#c5a356"/>
    <circle cx="160" cy="320" r="5" fill="#c5a356"/>
    <!-- Right branches -->
    <path d="M280 240 L332 200 L372 200"/>
    <path d="M332 200 L352 160"/>
    <path d="M280 240 L332 280 L372 280"/>
    <path d="M332 280 L352 320"/>
    <circle cx="372" cy="200" r="6" fill="#c5a356"/>
    <circle cx="352" cy="160" r="5" fill="#c5a356"/>
    <circle cx="372" cy="280" r="6" fill="#c5a356"/>
    <circle cx="352" cy="320" r="5" fill="#c5a356"/>
    <!-- Top/bottom -->
    <path d="M256 216 L256 160 L220 120"/>
    <path d="M256 160 L292 120"/>
    <path d="M256 264 L256 320 L220 360"/>
    <path d="M256 320 L292 360"/>
    <circle cx="220" cy="120" r="5" fill="#c5a356"/>
    <circle cx="292" cy="120" r="5" fill="#c5a356"/>
    <circle cx="220" cy="360" r="5" fill="#c5a356"/>
    <circle cx="292" cy="360" r="5" fill="#c5a356"/>
  </g>
  <!-- Text -->
  <text x="256" y="430" font-family="serif" font-size="48" font-weight="700" fill="#c5a356" text-anchor="middle" letter-spacing="8">缸中之脑</text>
</svg>
