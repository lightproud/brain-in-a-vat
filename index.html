    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: #1a1a3e;
            --bg-card-hover: #222255;

            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;

            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #2a2a5a;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5fa;
            --bg-secondary: #eeeef5;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0ff;
            --text-primary: #1a1a2e;
            --text-secondary: #555580;
            --text-muted: #8888aa;
            --border-color: #d0d0e0;
            --gradient-start: #667eea;

        }

        * {

        body {

            background: var(--bg-primary);

            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {

            text-align: center;
            position: relative;

        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .header h1 span.game-title {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .header-meta {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.5rem;
        }

        .header-meta .update-time {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .pulse-dot.stale {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        .pulse-dot.offline {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-purple);
        }

        .stat-label {
            font-size: 0.75rem;

            text-transform: uppercase;

        /* Search bar */

        .search-input:focus {

        /* Filter tabs */

            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: var(--bg-secondary);

        .filter-bar::-webkit-scrollbar {

        }

        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);

            cursor: pointer;
            white-space: nowrap;

        .filter-btn:hover {
            border-color: var(--accent-purple);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            color: white;
        }

        .filter-btn.hidden {
            display: none;
        }

        .sort-bar {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            padding: 0 1.5rem 0.5rem;
            background: var(--bg-secondary);
        }

        .sort-btn {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.75rem;

            transition: all 0.2s;

        .sort-btn:hover {
            color: var(--text-primary);

        .sort-btn.active {
            background: var(--accent-blue);

        .filter-badge {

            align-items: center;

            min-width: 1.2em;
            height: 1.2em;
            padding: 0 0.3em;

        .filter-btn.active .filter-badge {

        }

        /* Main content */
        .main-content {
            max-width: 960px;

        /* Summary section */
        .daily-summary {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));

        /* News cards */
        .news-list {
            display: flex;

        .news-card {
            background: var(--bg-card);

        .news-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-purple);
            transform: translateY(-1px);
        }

        .news-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            gap: 0.75rem;

        .news-card-title {
            font-size: 1.05rem;

        .news-card-title a {

        .news-card-title a:hover {
            color: var(--accent-purple);

        .hot-badge {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-pink));
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;

        .news-card-summary {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            line-height: 1.7;
        }

        .news-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);

        .source-tag {
            display: inline-flex;

        .source-reddit { background: rgba(255, 69, 0, 0.15); color: #ff6b35; }
        .source-twitter { background: rgba(29, 155, 240, 0.15); color: #1d9bf0; }
        .source-bilibili { background: rgba(0, 174, 236, 0.15); color: #00aeec; }

        .meta-item {

            align-items: center;

        /* Topic tags */
        .topic-tags {
            display: flex;

        .topic-tag {

        /* Loading & empty states */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;

        @keyframes spin {

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .footer a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        /* Theme toggle */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Share button */
        .share-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .share-btn:hover {
            color: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        /* Trend badges */
        .trend-badge {
            font-size: 0.68rem;
            padding: 0.1rem 0.45rem;
            border-radius: 8px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .trend-rising {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .trend-new {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .stats-bar { gap: 1rem; }
            .stat-value { font-size: 1.1rem; }
            .main-content { padding: 1rem; }
            .news-card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
        <h1>

    <div class="stats-bar">

    <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="official">官方公告</button>
        <button class="filter-btn" data-filter="reddit">Reddit</button>
        <button class="filter-btn" data-filter="twitter">Twitter/X</button>
        <button class="filter-btn" data-filter="bilibili">B站</button>
        <button class="filter-btn" data-filter="taptap">TapTap</button>
        <button class="filter-btn" data-filter="nga">NGA</button>
        <button class="filter-btn" data-filter="discord">Discord</button>
        <button class="filter-btn" data-filter="youtube">YouTube</button>
    </div>

    <div class="sort-bar" id="sort-bar">
        <button class="sort-btn active" data-sort="hot">热度优先</button>
        <button class="sort-btn" data-sort="time">最新优先</button>
        <button class="sort-btn" data-sort="engagement">互动最多</button>
    </div>

    <main class="main-content">
        <section class="daily-summary" id="daily-summary">
            <h2>📋 今日总结</h2>
            <p id="summary-text">加载中...</p>
        </section>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在加载社区热点...</p>
        </div>

        <div class="news-list" id="news-list"></div>

            <p>暂无该分类的热点内容</p>

    </main>

    <footer class="footer">
        <p>忘却前夜 Morimens 社区热点聚合 &mdash; 数据每小时自动更新</p>
        <div id="source-health" style="margin-top:0.5rem;"></div>
        <p style="margin-top:0.5rem;">
            数据来源：Reddit · Twitter/X · Bilibili · TapTap · NGA · Discord · YouTube
            · <a href="data/feed.xml">RSS Feed</a>
        </p>
    </footer>

    <script>
        const DATA_URL = 'data/news.json';
        const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 minutes
        const CACHE_KEY = 'morimens_news_cache';
        const RENDER_BATCH = 20; // Lazy rendering batch size

        let allNews = [];
        let currentFilter = 'all';
        let currentSort = 'hot';
        let searchQuery = '';
        let renderedCount = 0;

        // Source display config
        const SOURCE_CONFIG = {
            reddit:   { label: 'Reddit',    class: 'source-reddit' },
            twitter:  { label: 'Twitter/X', class: 'source-twitter' },
            bilibili: { label: 'B站',       class: 'source-bilibili' },
            taptap:   { label: 'TapTap',    class: 'source-taptap' },
            nga:      { label: 'NGA',       class: 'source-nga' },
            discord:  { label: 'Discord',   class: 'source-discord' },
            youtube:  { label: 'YouTube',   class: 'source-youtube' },
            official: { label: '官方',      class: 'source-official' },
        };

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return '刚刚';
            if (diffMin < 60) return `${diffMin} 分钟前`;
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return `${diffHr} 小时前`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function formatNumber(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return String(n);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getTrendBadge(item) {
            const ageMs = Date.now() - new Date(item.time).getTime();
            const ageHrs = ageMs / 3600000;
            if (ageHrs <= 2) return '<span class="trend-badge trend-new">NEW</span>';
            if (item.engagement >= 200 && ageHrs <= 8) return '<span class="trend-badge trend-rising">📈 Rising</span>';
            return '';
        }

        function renderCard(item) {
            const src = SOURCE_CONFIG[item.source] || { label: escapeHtml(item.source), class: '' };
            const hotBadge = item.is_hot ? `<span class="hot-badge">🔥 热门</span>` : '';
            const trendBadge = getTrendBadge(item);
            const tags = (item.tags || []).map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('');
            const safeTitle = escapeHtml(item.title);
            const link = item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${safeTitle}</a>` : safeTitle;
            const shareData = item.url ? `data-share-url="${escapeHtml(item.url)}" data-share-title="${safeTitle}"` : '';

            return `
                <article class="news-card" data-source="${item.source}">
                    <div class="news-card-header">
                        <div class="news-card-title">${link}</div>
                        ${trendBadge}${hotBadge}
                    </div>
                    <div class="news-card-summary">${escapeHtml(item.summary || '')}</div>
                    <div class="news-card-meta">
                        <span class="source-tag ${src.class}">${src.label}</span>
                        <span class="meta-item">🕐 ${formatTime(item.time)}</span>
                        ${item.engagement ? `<span class="meta-item">💬 ${formatNumber(item.engagement)}</span>` : ''}
                        ${item.author ? `<span class="meta-item">👤 ${escapeHtml(item.author)}</span>` : ''}
                        ${shareData ? `<button class="share-btn" ${shareData} onclick="shareItem(this, event)">分享</button>` : ''}
                    </div>
                    ${tags ? `<div class="topic-tags">${tags}</div>` : ''}
                </article>
            `;
        }

        async function shareItem(btn, e) {
            e.stopPropagation();
            const url = btn.dataset.shareUrl;
            const title = btn.dataset.shareTitle;
            if (navigator.share) {
                try { await navigator.share({ title, url }); } catch {}
            } else {
                await navigator.clipboard.writeText(url);
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '分享'; }, 1500);
            }
        }

        function sortNews() {
            allNews.sort((a, b) => {
                if (currentSort === 'hot') {
                    if (a.is_hot !== b.is_hot) return b.is_hot ? 1 : -1;
                    return new Date(b.time) - new Date(a.time);
                } else if (currentSort === 'time') {
                    return new Date(b.time) - new Date(a.time);
                } else {
                    return (b.engagement || 0) - (a.engagement || 0);
                }
            });
        }

        function getFilteredNews() {
            let filtered = currentFilter === 'all'
                ? allNews
                : allNews.filter(n => n.source === currentFilter);
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(n =>
                    (n.title || '').toLowerCase().includes(q) ||
                    (n.summary || '').toLowerCase().includes(q) ||
                    (n.tags || []).some(t => t.toLowerCase().includes(q))
                );
            }
            return filtered;
        }

        let _filteredCache = [];

        function renderNews() {
            const list = document.getElementById('news-list');
            const empty = document.getElementById('empty-state');
            _filteredCache = getFilteredNews();

            if (_filteredCache.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                renderedCount = 0;
            } else {
                renderedCount = Math.min(RENDER_BATCH, _filteredCache.length);
                list.innerHTML = _filteredCache.slice(0, renderedCount).map(renderCard).join('');
                empty.style.display = 'none';
            }
        }

        function renderMoreCards() {
            if (renderedCount >= _filteredCache.length) return;
            const list = document.getElementById('news-list');
            const next = Math.min(renderedCount + RENDER_BATCH, _filteredCache.length);
            const fragment = _filteredCache.slice(renderedCount, next).map(renderCard).join('');
            list.insertAdjacentHTML('beforeend', fragment);
            renderedCount = next;
        }

        // Infinite scroll for lazy rendering
        const _scrollObserver = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) renderMoreCards();
        }, { rootMargin: '200px' });

        (function initScrollSentinel() {
            const sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            document.querySelector('.main-content').appendChild(sentinel);
            _scrollObserver.observe(sentinel);
        })();

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.news.length;
            const sources = new Set(data.news.map(n => n.source));
            document.getElementById('stat-sources').textContent = sources.size;
            const totalEngagement = data.news.reduce((s, n) => s + (n.engagement || 0), 0);
            document.getElementById('stat-engagement').textContent = formatNumber(totalEngagement);
        }

        function updateFilterBadges() {
            const counts = { all: allNews.length };
            allNews.forEach(n => {
                counts[n.source] = (counts[n.source] || 0) + 1;
            });
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const filter = btn.dataset.filter;
                const count = counts[filter] || 0;
                // Update or create badge
                let badge = btn.querySelector('.filter-badge');
                if (filter === 'all') {
                    if (!badge) { badge = document.createElement('span'); badge.className = 'filter-badge'; btn.appendChild(badge); }
                    badge.textContent = counts.all;
                    return;
                }
                if (count > 0) {
                    btn.classList.remove('hidden');
                    if (!badge) { badge = document.createElement('span'); badge.className = 'filter-badge'; btn.appendChild(badge); }
                    badge.textContent = count;
                } else {
                    btn.classList.add('hidden');
                    // If this hidden filter was active, switch to "all"
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
                        currentFilter = 'all';
                    }
                }
            });
        }

        function applyData(data) {
            allNews = data.news;
            sortNews();

            const updatedAt = new Date(data.updated_at);
            const ageMs = Date.now() - updatedAt.getTime();
            const ageHrs = ageMs / 3600000;
            const dot = document.querySelector('.pulse-dot');
            const summarySection = document.getElementById('daily-summary');

            document.getElementById('update-time').textContent =
                `最后更新：${updatedAt.toLocaleString('zh-CN')}`;

            dot.classList.remove('stale', 'offline');
            if (ageHrs > 24) {
                dot.classList.add('offline');
                document.getElementById('update-time').textContent += ' (数据已过期)';
                summarySection.style.display = 'none';
            } else if (ageHrs > 2) {
                dot.classList.add('stale');
                document.getElementById('update-time').textContent += ` (${Math.floor(ageHrs)}小时前)`;
                summarySection.style.display = '';
            } else {
                summarySection.style.display = '';
            }

            if (data.summary && ageHrs <= 24) {
                document.getElementById('summary-text').innerHTML = data.summary;
            }

            updateStats(data);
            updateFilterBadges();
            renderNews();
            renderSourceHealth(data.stats);
            document.getElementById('loading').style.display = 'none';
        }

        async function loadData() {
            // Try localStorage cache first for instant display
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const cachedData = JSON.parse(cached);
                    applyData(cachedData);
                }
            } catch {}

            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('Fetch failed');
                const data = await res.json();

                // Cache in localStorage
                try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch {}

                applyData(data);
            } catch (err) {
                console.error('Failed to load news data:', err);
                if (!allNews.length) {
                    document.getElementById('loading').innerHTML =
                        '<p>数据加载失败，请稍后刷新重试。</p>';
                }
            }
        }

        function renderSourceHealth(stats) {
            if (!stats || !stats.sources) return;
            const el = document.getElementById('source-health');
            const indicators = Object.entries(stats.sources).map(([name, s]) => {
                const icon = s.status === 'ok' ? '🟢' : s.status === 'empty' ? '🟡' : '🔴';
                const label = (SOURCE_CONFIG[name] || {}).label || name;
                return `${icon} ${label}(${s.count})`;
            });
            el.textContent = indicators.join('  ');
        }

        // Search input
        document.getElementById('search-input').addEventListener('input', e => {
            searchQuery = e.target.value.trim();
            renderNews();
        });

        // Sort buttons
        document.getElementById('sort-bar').addEventListener('click', e => {
            if (!e.target.classList.contains('sort-btn')) return;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentSort = e.target.dataset.sort;
            sortNews();
            renderNews();
        });

        // Filter buttons - click
        document.getElementById('filter-bar').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            renderNews();
        });

        // Filter buttons - keyboard navigation (arrow keys)
        document.getElementById('filter-bar').addEventListener('keydown', e => {
            if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
            const btns = [...document.querySelectorAll('.filter-btn:not(.hidden)')];
            const idx = btns.indexOf(document.activeElement);
            if (idx < 0) return;
            e.preventDefault();
            const next = e.key === 'ArrowRight' ? (idx + 1) % btns.length : (idx - 1 + btns.length) % btns.length;
            btns[next].focus();
            btns[next].click();
        });

        // Theme toggle
        (function initTheme() {
            const saved = localStorage.getItem('morimens_theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        })();

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const btn = document.getElementById('theme-toggle');
            if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('morimens_theme', 'dark');
                btn.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('morimens_theme', 'light');
                btn.textContent = '☀️';
            }
        });

        // Initial load & auto-refresh
        loadData();
        setInterval(loadData, AUTO_REFRESH_MS);
    </script>
</body>
</html>
